<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Bubble.lh">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Bubble.lh</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --panel: #f6f7f8;
      --panel-strong: #eef0f2;
      --surface: #ffffff;
      --text: #20242a;
      --muted: #8c96a3;
      --line: #e6e9ed;
      --accent: #2b8fe8;
      --accent-dark: #1778cf;
      --danger: #d94848;
      --ok: #35a66b;
      --warn: #d9892b;
      --shadow: 0 8px 24px rgba(22, 28, 36, .08);
      --radius: 8px;
      --sidebar-width: 360px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      background: var(--bg);
    }

    body.sidebar-collapsed .app {
      grid-template-columns: 1fr;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      height: 100vh;
      overflow: hidden;
      transition: transform .22s ease;
      z-index: 20;
    }

    body.sidebar-collapsed .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: min(var(--sidebar-width), 86vw);
      transform: translateX(-102%);
      box-shadow: var(--shadow);
    }

    body.sidebar-open .sidebar {
      transform: translateX(0);
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 15;
      background: transparent;
      display: none;
      pointer-events: none;
    }

    body.sidebar-open .sidebar-backdrop {
      display: block;
    }

    .sidebar-head {
      height: 64px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      font-weight: 700;
      letter-spacing: .01em;
      font-size: 18px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      color: #4f5965;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .icon-btn:hover,
    .icon-btn.active {
      background: var(--panel);
      color: var(--text);
    }

    .side-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .tab-btn {
      height: 36px;
      border-radius: var(--radius);
      background: transparent;
      color: #5d6672;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 13px;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: var(--panel-strong);
      color: var(--text);
      font-weight: 650;
    }

    .side-panel {
      display: none;
      flex: 1;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 14px;
      scrollbar-gutter: stable;
    }

    .side-panel.active {
      display: block;
    }

    .primary-btn,
    .ghost-btn,
    .danger-btn {
      height: 38px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      font-weight: 650;
    }

    .primary-btn {
      color: #fff;
      background: var(--accent);
    }

    .primary-btn:hover {
      background: var(--accent-dark);
    }

    .ghost-btn {
      color: #4f5965;
      background: var(--panel);
    }

    .ghost-btn.active {
      background: #eef7ff;
      color: var(--accent-dark);
    }

    .danger-btn {
      color: #fff;
      background: var(--danger);
    }

    .search-box {
      position: relative;
      margin: 12px 0;
    }

    .search-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 12px 0 36px;
      color: var(--text);
      background: var(--surface);
      outline: none;
    }

    .conversation-list,
    .favorite-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .convo-item,
    .fav-item {
      width: 100%;
      text-align: left;
      border-radius: var(--radius);
      padding: 10px;
      background: transparent;
      color: var(--text);
      border: 1px solid transparent;
    }

    .convo-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .convo-main {
      min-width: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      padding: 0;
    }

    .convo-actions {
      display: inline-flex;
      gap: 2px;
      align-items: center;
      opacity: .72;
    }

    .convo-action {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
    }

    .convo-action:hover {
      background: var(--surface);
      color: var(--text);
    }

    .convo-action.danger:hover {
      color: var(--danger);
      background: #fff1f1;
    }

    .convo-action.active {
      color: #d9a21b;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .tag-pill {
      display: inline-flex;
      width: auto;
      align-items: center;
      max-width: 100%;
      border: 0;
      border-radius: 999px;
      background: #edf2f7;
      color: #5d6672;
      padding: 2px 7px;
      font-size: 11px;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    .tag-pill:hover {
      background: #dfe8f2;
      color: var(--text);
    }

    .note-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .note-toggle input {
      width: auto;
      accent-color: var(--accent);
    }

    .fav-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 32px;
      gap: 6px;
      align-items: center;
    }

    .fav-jump {
      min-width: 0;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      text-align: left;
      padding: 0;
    }

    .fav-remove {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
    }

    .fav-remove:hover {
      color: var(--danger);
      background: #fff1f1;
    }

    .favorite-section-title {
      margin: 8px 0 6px;
      color: #5d6672;
      font-size: 12px;
      font-weight: 700;
    }

    .convo-item:hover,
    .fav-item:hover {
      background: var(--panel);
    }

    .convo-item.active {
      background: #edf6ff;
      border-color: #cfe7ff;
    }

    .convo-title {
      display: block;
      font-size: 14px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .convo-meta,
    .fav-meta {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .setting-group {
      margin-bottom: 18px;
    }

    .setting-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      color: #5d6672;
      font-weight: 650;
    }

    .setting-help {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .setting-help.warn {
      color: var(--warn);
    }

    .setting-help.danger {
      color: var(--danger);
    }

    .count-warn {
      color: var(--warn);
    }

    .count-danger {
      color: var(--danger);
    }

    .label-left {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .info-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
      font-size: 12px;
    }

    .info-btn:hover {
      color: var(--text);
      background: var(--panel);
    }

    .info-popover {
      position: fixed;
      z-index: 90;
      width: min(260px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: #5d6672;
      box-shadow: var(--shadow);
      font-size: 12px;
      line-height: 1.55;
    }

    .field,
    .textarea,
    .select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .field,
    .select {
      height: 40px;
      padding: 0 11px;
    }

    .range-field {
      width: 100%;
      accent-color: var(--accent);
    }

    .textarea {
      min-height: 96px;
      padding: 10px 11px;
      resize: vertical;
      line-height: 1.5;
    }

    .note-editor {
      position: relative;
    }

    .note-editor .textarea {
      padding-bottom: 34px;
    }

    .note-tools {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      background: rgba(255, 255, 255, .9);
      border-radius: 6px;
      padding-left: 6px;
    }

    .note-count.warn {
      color: var(--warn);
    }

    .note-count.danger {
      color: var(--danger);
    }

    .note-expand {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .note-expand:hover {
      background: var(--panel);
      color: var(--text);
    }

    .modal-textarea {
      width: 100%;
      min-height: min(58vh, 520px);
      resize: vertical;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      background: var(--panel);
      padding: 4px;
      border-radius: var(--radius);
    }

    .segmented button {
      height: 34px;
      border-radius: 6px;
      background: transparent;
      color: #5d6672;
      font-weight: 650;
    }

    .segmented button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: 64px 1fr auto;
      height: 100vh;
      background: var(--bg);
    }

    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(18px);
      z-index: 10;
      position: relative;
    }

    .top-title {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      min-width: 0;
      max-width: min(520px, 42vw);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 750;
    }

    .title-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .topbar-spacer {
      flex: 1;
    }

    .chat {
      min-height: 0;
      overflow: auto;
      padding: 28px max(22px, calc((100vw - 980px) / 2)) 32px;
      scroll-behavior: smooth;
    }

    .empty {
      max-width: 720px;
      margin: 20vh auto 0;
      text-align: center;
      color: var(--muted);
    }

    .empty h1 {
      color: var(--text);
      font-size: 28px;
      margin: 0 0 10px;
    }

    .message {
      display: flex;
      margin-bottom: 34px;
    }

    .message.user {
      justify-content: flex-end;
    }

    .avatar {
      display: none;
    }

    .message-body {
      min-width: 0;
      max-width: 780px;
    }

    .message.user .message-body {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      max-width: min(66vw, 560px);
    }

    .bubble {
      max-width: min(760px, 100%);
      border-radius: 8px;
      padding: 15px 18px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.72;
      font-size: 16px;
      background: var(--panel-strong);
    }

    .message.user .bubble {
      background: var(--accent);
      color: #fff;
      line-height: 1.45;
      padding: 9px 13px;
    }

    .message.assistant .bubble {
      background: transparent;
      padding: 0;
      border-radius: 0;
      line-height: 1.8;
    }

    .message.assistant .meta {
      margin-top: 12px;
    }

    .message.assistant .tools {
      margin-top: 8px;
    }

    .message.search-hit .bubble {
      outline: 2px solid #ffd37a;
      outline-offset: 4px;
      border-radius: var(--radius);
      background: #fff9ed;
    }

    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .thinking i {
      color: #8c96a3;
    }

    .thinking-details {
      margin-bottom: 6px;
      color: #6b7280;
    }

    .thinking-details summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      cursor: pointer;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      list-style: none;
    }

    .thinking-details summary::after {
      content: "\f107";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      color: #9aa3af;
      font-size: 11px;
      margin-left: 2px;
    }

    .thinking-details[open] summary::after {
      content: "\f106";
    }

    .thinking-details summary::-webkit-details-marker {
      display: none;
    }

    .thinking-details summary i {
      color: #8c96a3;
    }

    .thinking-content {
      margin-top: 6px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: #f7f8f9;
      border-radius: var(--radius);
      color: #5d6672;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      font-family: var(--mono);
    }

    .message.user .meta {
      text-align: right;
    }

    .tools {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      height: 44px;
      padding: 0 8px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(26, 32, 44, .08);
      gap: 2px;
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity .14s ease, transform .14s ease;
    }

    .message:hover .tools,
    .message:focus-within .tools,
    .tools.pinned {
      opacity: 1;
      transform: translateY(0);
    }

    .tool-btn {
      width: 38px;
      height: 38px;
      border-radius: 7px;
      color: #515b66;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .tool-btn:hover,
    .tool-btn.active {
      background: var(--panel);
      color: var(--text);
    }

    .tool-menu {
      position: fixed;
      z-index: 50;
      min-width: 180px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .tool-menu button {
      width: 100%;
      height: 36px;
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      text-align: left;
    }

    .tool-menu button i {
      width: 16px;
      color: var(--muted);
      text-align: center;
    }

    .tool-menu button i.empty-icon {
      opacity: 0;
    }

    .tool-menu button:hover {
      background: var(--panel);
    }

    .composer-wrap {
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, .95);
      padding: 14px max(18px, calc((100vw - 980px) / 2)) calc(14px + env(safe-area-inset-bottom));
    }

    .composer {
      border: 1px solid #dce1e6;
      background: #f7f8f9;
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 10px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .03);
    }

    .composer textarea {
      grid-column: 1 / 3;
      min-height: 64px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .status-pill {
      height: 32px;
      max-width: 230px;
      padding: 0 10px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #4f5965;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    button.status-pill {
      cursor: pointer;
    }

    button.status-pill:hover {
      border-color: #cbd3dc;
      color: var(--text);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: end;
      font-size: 17px;
    }

    .send-btn:disabled {
      background: #cfd6de;
    }

    .send-btn.generating {
      background: var(--danger);
    }

    .footer-note {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 110px;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(28, 34, 42, .92);
      border-radius: var(--radius);
      padding: 9px 12px;
      z-index: 80;
      font-size: 13px;
      box-shadow: var(--shadow);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(16, 22, 30, .36);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 70;
      padding: 18px;
    }

    .modal-card {
      width: min(620px, 100%);
      max-height: min(80vh, 720px);
      overflow: auto;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .modal-card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .context-preview {
      display: grid;
      gap: 12px;
    }

    .context-preview-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .context-preview-stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
    }

    .context-preview-stat strong {
      display: block;
      color: var(--text);
      font-size: 16px;
      margin-top: 3px;
    }

    .context-preview-list {
      display: grid;
      gap: 8px;
    }

    .context-preview-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: var(--surface);
    }

    .context-preview-role {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .context-preview-text {
      color: var(--text);
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 180px;
      overflow: auto;
    }

    .message-search-box {
      display: grid;
      gap: 10px;
    }

    .message-search-results {
      display: grid;
      gap: 8px;
      max-height: min(52vh, 460px);
      overflow: auto;
    }

    .message-search-result {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px 12px;
      color: var(--text);
    }

    .message-search-result:hover {
      background: var(--panel);
    }

    .message-search-snippet {
      margin-top: 5px;
      color: #4f5965;
      font-size: 13px;
      line-height: 1.55;
    }

    .message-search-snippet mark {
      background: #fff0b8;
      color: inherit;
      padding: 0 2px;
      border-radius: 3px;
    }

    .meter {
      height: 8px;
      background: var(--panel-strong);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .meter-fill {
      height: 100%;
      width: 0;
      background: var(--ok);
      transition: width .18s ease;
    }

    .meter-fill.warn {
      background: var(--warn);
    }

    .meter-fill.danger {
      background: var(--danger);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(var(--sidebar-width), 86vw);
        transform: translateX(-102%);
        box-shadow: var(--shadow);
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      body.sidebar-open .sidebar-backdrop {
        background: rgba(15, 23, 42, .18);
        pointer-events: auto;
      }

      .chat {
        padding: 22px 16px 24px;
      }

      .message {
        display: flex;
      }

      .message.user {
        justify-content: flex-end;
      }

      .bubble {
        font-size: 16px;
        padding: 13px 15px;
      }

      .context-preview-summary {
        grid-template-columns: 1fr;
      }

      .context-preview-text {
        max-height: 140px;
      }

      .tools {
        opacity: 1;
        transform: none;
      }

      .composer-wrap {
        padding-left: 12px;
        padding-right: 12px;
      }

    }

    /* ===== Mobile polished layout v2 ===== */
    .mobile-only,
    .mobile-scroll-tools,
    .mobile-bottom-btn {
      display: none;
    }

    @media (max-width: 820px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .app {
        height: 100dvh;
        grid-template-columns: 1fr;
      }

      .main {
        height: 100dvh;
        grid-template-rows: calc(56px + env(safe-area-inset-top)) 1fr auto;
      }

      .sidebar {
        width: min(380px, 92vw);
      }

      .sidebar-head {
        height: calc(56px + env(safe-area-inset-top));
        padding: env(safe-area-inset-top) 14px 0;
      }

      .side-tabs {
        padding: 10px;
        gap: 3px;
      }

      .tab-btn {
        height: 34px;
        font-size: 12px;
        gap: 4px;
      }

      .side-panel {
        padding: 12px;
      }

      .topbar {
        height: calc(56px + env(safe-area-inset-top));
        padding: env(safe-area-inset-top) 12px 0;
        gap: 6px;
      }

      .topbar .icon-btn {
        width: 36px;
        height: 36px;
        font-size: 17px;
      }

      .mobile-only {
        display: inline-flex;
      }

      #jumpTopBtn,
      #jumpPrevUserBtn,
      #jumpBottomBtn {
        display: none;
      }

      .top-title {
        max-width: 46vw;
        font-size: 17px;
        gap: 4px;
      }

      #renameBtn {
        width: 28px;
        height: 28px;
        font-size: 14px;
      }

      .chat {
        padding: 18px 14px 16px;
      }

      .message.user .message-body {
        max-width: 82vw;
      }

      .message-body {
        max-width: 100%;
      }

      .bubble {
        font-size: 16px;
        padding: 13px 15px;
      }

      .tools {
        opacity: 1;
        transform: none;
      }

      .composer-wrap {
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      }

      .composer {
        grid-template-columns: 1fr 50px;
        gap: 7px;
        padding: 9px;
      }

      .composer textarea {
        min-height: 54px;
        max-height: 128px;
        font-size: 16px;
        line-height: 1.45;
      }

      .composer-actions {
        grid-column: 1 / 2;
        display: flex;
        align-items: center;
        gap: 6px;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding: 1px 2px 2px 0;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .composer-actions::-webkit-scrollbar {
        display: none;
      }

      .composer-actions .icon-btn {
        width: 33px;
        height: 33px;
        flex: 0 0 auto;
      }

      #fullscreenInputBtn,
      #settingsQuickBtn {
        display: none;
      }

      .status-pill {
        height: 33px;
        flex: 0 0 auto;
        padding: 0 9px;
        font-size: 12px;
      }

      #statsPill {
        min-width: 54px;
      }

      #modePill {
        min-width: 72px;
      }

      #modelPill {
        max-width: 132px;
      }

      .send-btn {
        width: 48px;
        height: 48px;
      }

      .footer-note {
        margin-top: 6px;
        font-size: 11px;
        line-height: 1.35;
      }

      .modal {
        align-items: flex-end;
        padding: 10px;
      }

      .modal-card {
        width: 100%;
        max-height: min(88dvh, 720px);
        border-radius: 10px;
        padding: 16px;
      }

      .modal-card h2 {
        font-size: 17px;
      }

      .tool-menu {
        max-width: calc(100vw - 24px);
        max-height: min(58dvh, 420px);
        overflow: auto;
      }

      .mobile-scroll-tools {
        position: fixed;
        top: calc(56px + env(safe-area-inset-top));
        left: 0;
        right: 0;
        height: 44px;
        z-index: 45;
        display: flex;
        background: rgba(246, 247, 248, .96);
        border-bottom: 1px solid var(--line);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-8px);
        transition: opacity .18s ease, transform .18s ease;
        backdrop-filter: blur(16px);
      }

      .mobile-scroll-tools.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .mobile-scroll-tools button {
        flex: 1;
        min-width: 0;
        border: 0;
        border-right: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        font-size: 14px;
      }

      .mobile-scroll-tools button:last-child {
        border-right: 0;
      }

      .mobile-bottom-btn {
        position: fixed;
        right: 14px;
        bottom: calc(136px + env(safe-area-inset-bottom));
        z-index: 46;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition: opacity .18s ease, transform .18s ease;
      }

      .mobile-bottom-btn.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
    }

    @media (max-width: 380px) {
      .topbar {
        padding-left: 8px;
        padding-right: 8px;
      }

      .top-title {
        max-width: 40vw;
        font-size: 16px;
      }

      .composer-actions {
        gap: 5px;
      }

      .composer-actions .icon-btn {
        width: 31px;
        height: 31px;
      }

      #statsPill {
        display: none;
      }

      #modelPill {
        max-width: 112px;
      }
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="brand">Bubble.lh</div>
        <button class="icon-btn" id="collapseSidebarBtn" title="收起侧栏">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="side-tabs">
        <button class="tab-btn active" data-tab="chats" title="聊天">
          <i class="fa-solid fa-comments"></i><span>聊天</span>
        </button>
        <button class="tab-btn" data-tab="notes" title="设定">
          <i class="fa-solid fa-book-open"></i><span>设定</span>
        </button>
        <button class="tab-btn" data-tab="favorites" title="收藏">
          <i class="fa-solid fa-star"></i><span>收藏</span>
        </button>
        <button class="tab-btn" data-tab="settings" title="设置">
          <i class="fa-solid fa-gear"></i><span>设置</span>
        </button>
      </div>

      <section class="side-panel active" id="tab-chats">
        <button class="primary-btn" id="newChatBtn" style="width: 100%;">
          <i class="fa-solid fa-plus"></i>新建对话
        </button>
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="searchInput" placeholder="搜索标题、消息、收藏">
        </div>
        <button class="ghost-btn" id="archiveFilterBtn" style="width: 100%; margin-top: 8px;">
          <i class="fa-solid fa-box-archive"></i>查看归档
        </button>
        <div class="conversation-list" id="conversationList" style="margin-top: 12px;"></div>
      </section>

      <section class="side-panel" id="tab-favorites">
        <div class="favorite-list" id="favoriteList"></div>
      </section>

      <section class="side-panel" id="tab-notes">
        <div class="setting-group">
          <div class="setting-label">
            <span>对话摘要</span>
            <button class="ghost-btn" id="generateSummaryBtn" style="height:30px;padding:0 10px;"><i class="fa-solid fa-file-lines"></i>生成/更新</button>
          </div>
          <textarea class="textarea" id="conversationSummaryInput" placeholder="保存全文梗概、主线状态、后续承接点。Creative 模式会自动带入。"></textarea>
        </div>
        <div class="setting-group">
          <div class="setting-label"><span>角色设定</span><label class="note-toggle"><input type="checkbox" class="note-context-toggle" data-note-toggle="characters" checked>带入</label></div>
          <div class="note-editor">
            <textarea class="textarea writing-note" id="noteCharacters" data-note-key="characters" placeholder="人物关系、性格、口癖、动机"></textarea>
            <div class="note-tools"><span class="note-count" data-count-for="characters">0 字</span><button class="note-expand" data-expand-note="characters" title="全屏编辑"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button></div>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-label"><span>世界观设定</span><label class="note-toggle"><input type="checkbox" class="note-context-toggle" data-note-toggle="world" checked>带入</label></div>
          <div class="note-editor">
            <textarea class="textarea writing-note" id="noteWorld" data-note-key="world" placeholder="背景、规则、组织、地点"></textarea>
            <div class="note-tools"><span class="note-count" data-count-for="world">0 字</span><button class="note-expand" data-expand-note="world" title="全屏编辑"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button></div>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-label"><span>时间线</span><label class="note-toggle"><input type="checkbox" class="note-context-toggle" data-note-toggle="timeline" checked>带入</label></div>
          <div class="note-editor">
            <textarea class="textarea writing-note" id="noteTimeline" data-note-key="timeline" placeholder="已发生事件、章节顺序、关键时间点"></textarea>
            <div class="note-tools"><span class="note-count" data-count-for="timeline">0 字</span><button class="note-expand" data-expand-note="timeline" title="全屏编辑"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button></div>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-label"><span>伏笔与待回收</span><label class="note-toggle"><input type="checkbox" class="note-context-toggle" data-note-toggle="foreshadowing" checked>带入</label></div>
          <div class="note-editor">
            <textarea class="textarea writing-note" id="noteForeshadowing" data-note-key="foreshadowing" placeholder="伏笔、谜团、待解释设定"></textarea>
            <div class="note-tools"><span class="note-count" data-count-for="foreshadowing">0 字</span><button class="note-expand" data-expand-note="foreshadowing" title="全屏编辑"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button></div>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-label"><span>文风与禁忌</span><label class="note-toggle"><input type="checkbox" class="note-context-toggle" data-note-toggle="style" checked>带入</label></div>
          <div class="note-editor">
            <textarea class="textarea writing-note" id="noteStyle" data-note-key="style" placeholder="文风偏好、不要写什么、称呼习惯"></textarea>
            <div class="note-tools"><span class="note-count" data-count-for="style">0 字</span><button class="note-expand" data-expand-note="style" title="全屏编辑"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button></div>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-label"><span>叙事规则</span><label class="note-toggle"><input type="checkbox" class="note-context-toggle" data-note-toggle="narrative" checked>带入</label></div>
          <div class="note-editor">
            <textarea class="textarea writing-note" id="noteNarrative" data-note-key="narrative" placeholder="叙述视角、节奏、信息揭示方式、章节推进原则"></textarea>
            <div class="note-tools"><span class="note-count" data-count-for="narrative">0 字</span><button class="note-expand" data-expand-note="narrative" title="全屏编辑"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button></div>
          </div>
        </div>
      </section>

      <section class="side-panel" id="tab-settings">
        <div class="setting-group">
          <div class="setting-label">模式</div>
          <div class="segmented">
            <button class="mode-btn active" data-mode="chat">Chat</button>
            <button class="mode-btn" data-mode="discuss">Discuss</button>
            <button class="mode-btn" data-mode="creative">Creative</button>
          </div>
        </div>

        <div class="setting-group">
          <div class="setting-label">
            <span class="label-left">API Endpoint<button class="info-btn" data-info="填你的 Cloudflare Worker 地址，用来把网页请求转发给 DeepSeek；这样 API Key 不会暴露在 GitHub Pages 前端。" title="说明"><i class="fa-solid fa-info"></i></button></span>
          </div>
          <input class="field" id="endpointInput" placeholder="Cloudflare Worker URL">
        </div>

        <div class="setting-group">
          <div class="setting-label">API Key</div>
          <input class="field" id="apiKeyInput" type="password" placeholder="仅本地直连测试，不建议部署使用">
        </div>

        <div class="setting-group">
          <div class="setting-label">
            <span class="label-left">Worker Access Token<button class="info-btn" data-info="可选。与 Cloudflare Worker 里的 ACCESS_TOKEN Secret 对应，用来防止别人直接调用你的 Worker 消耗额度。" title="说明"><i class="fa-solid fa-info"></i></button></span>
          </div>
          <input class="field" id="workerTokenInput" type="password" placeholder="部署 Worker 后建议填写">
        </div>

        <div class="setting-group">
          <div class="setting-label">
            <span class="label-left">上下文消息数量上限<button class="info-btn" data-info="实际生效。0 表示只发送当前这条用户消息，不带历史；不限制表示发送当前对话全部消息。数字越小越省上下文，但越容易丢前文。" title="说明"><i class="fa-solid fa-info"></i></button></span>
            <span id="contextMessageLimitValue">20</span>
          </div>
          <input class="range-field" id="contextMessageLimitInput" type="range" min="0" max="11" step="1">
        </div>

        <div class="setting-group">
          <div class="setting-label">
            <span class="label-left">Temperature<button class="info-btn" data-info="控制回复随机性。低一点更稳、更听指令；高一点更发散，更适合创作试味道。" title="说明"><i class="fa-solid fa-info"></i></button></span>
            <span id="temperatureValue">0.7</span>
          </div>
          <input class="field" id="temperatureInput" type="number" min="0" max="2" step="0.1">
        </div>

        <div class="setting-group">
          <div class="setting-label">
            <span class="label-left">Top P<button class="info-btn" data-info="控制候选词范围。一般保持 0.8-0.95；不确定时不用动，优先调 Temperature。" title="说明"><i class="fa-solid fa-info"></i></button></span>
            <span id="topPValue">0.9</span>
          </div>
          <input class="field" id="topPInput" type="number" min="0" max="1" step="0.05">
        </div>

        <div class="setting-group">
          <div class="setting-label">
            <span class="label-left">上下文 token 估算上限<button class="info-btn" data-info="只用于计算聊天底部的上下文占用百分比，不会截断消息。你可以按当前模型的上下文规模填写，例如 128000。" title="说明"><i class="fa-solid fa-info"></i></button></span>
          </div>
          <input class="field" id="contextLimitInput" type="number" min="1000" step="1000">
          <div class="meter"><div class="meter-fill" id="contextMeter"></div></div>
        </div>

        <div class="setting-group">
          <div class="setting-label">
            <span class="label-left">系统提示词<button class="info-btn" data-info="所有对话共用的基本规则。建议控制在 2000 字以内，过长会占用上下文；这里只提醒，不会限制输入。" title="说明"><i class="fa-solid fa-info"></i></button></span>
            <span id="systemPromptCount">0 字</span>
          </div>
          <textarea class="textarea" id="systemPromptInput" placeholder="所有对话共用的基本规则"></textarea>
        </div>

        <div class="setting-group">
          <div class="setting-label">Creative 附加规则</div>
          <textarea class="textarea" id="creativePromptInput" placeholder="只在 Creative 模式自动附加"></textarea>
        </div>

        <div class="row">
          <button class="ghost-btn" id="exportAllBtn"><i class="fa-solid fa-download"></i>导出全部数据</button>
          <button class="ghost-btn" id="importBtn"><i class="fa-solid fa-upload"></i>导入数据</button>
        </div>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn" id="openSidebarBtn" title="侧栏">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="top-title">
          <span class="title-text" id="titleText">新对话</span>
          <button class="icon-btn" id="renameBtn" title="重命名">
            <i class="fa-solid fa-pen"></i>
          </button>
        </div>
        <div class="topbar-spacer"></div>
        <button class="icon-btn" id="jumpTopBtn" title="跳转到顶端">
          <i class="fa-solid fa-angles-up"></i>
        </button>
        <button class="icon-btn" id="jumpPrevUserBtn" title="上一条用户消息">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
        <button class="icon-btn" id="jumpBottomBtn" title="跳转到底部">
          <i class="fa-solid fa-angles-down"></i>
        </button>
        <button class="icon-btn mobile-only" id="mobileFullscreenInputBtn" title="全屏输入">
          <i class="fa-solid fa-up-right-and-down-left-from-center"></i>
        </button>
        <button class="icon-btn" id="searchFocusBtn" title="搜索">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <button class="icon-btn" id="moreTopBtn" title="更多">
          <i class="fa-solid fa-ellipsis"></i>
        </button>
      </header>

      <section class="chat" id="chat"></section>

      <footer class="composer-wrap">
        <div class="composer">
          <textarea id="messageInput" placeholder="在这里输入你的问题..."></textarea>
          <div class="composer-actions">
            <button class="icon-btn" id="attachBtn" title="上传 TXT">
              <i class="fa-solid fa-plus"></i>
            </button>
            <button class="icon-btn" id="modeQuickBtn" title="写作指令">
              <i class="fa-solid fa-wand-magic-sparkles"></i>
            </button>
            <button class="icon-btn" id="fullscreenInputBtn" title="全屏输入">
              <i class="fa-solid fa-up-right-and-down-left-from-center"></i>
            </button>
            <button class="icon-btn" id="settingsQuickBtn" title="设置">
              <i class="fa-solid fa-gear"></i>
            </button>
            <button class="icon-btn" id="contextPreviewBtn" title="带入预览">
              <i class="fa-regular fa-eye"></i>
            </button>
            <span class="status-pill" id="statsPill"></span>
            <button class="status-pill" id="modePill" title="切换模式"></button>
            <button class="status-pill" id="modelPill" title="切换模型"></button>
          </div>
          <button class="send-btn" id="sendBtn" title="发送">
            <i class="fa-solid fa-arrow-up"></i>
          </button>
        </div>
        <div class="footer-note">AI 生成的内容可能不准确，请核实重要信息。</div>
      </footer>
    </main>

    <div class="mobile-scroll-tools" id="mobileScrollTools">
      <button id="mobileJumpTopBtn"><i class="fa-solid fa-arrow-up"></i> 跳转到顶部</button>
      <button id="mobileJumpPrevUserBtn"><i class="fa-solid fa-arrow-up"></i> 定位到上一条消息</button>
    </div>

    <button class="mobile-bottom-btn" id="mobileJumpBottomBtn" title="跳转到底部">
      <i class="fa-solid fa-arrow-down"></i>
    </button>
  </div>

  <script>
    const STORE_KEY = "bubblelh_v2_state";
    const DEFAULT_CREATIVE_PROMPT = "你现在处于 Creative 模式。请优先帮助用户进行创作、扩写、润色、续写和设定整理。保持叙事自然，不要替用户过快推进到后续重大情节；如果用户只是普通聊天或问代码问题，不要强行写文。";
    const CONTEXT_MESSAGE_LIMITS = [0, 2, 4, 6, 8, 10, 20, 50, 100, 200, 500, null];
    const state = {
      conversations: [],
      currentId: "",
      settings: {
        model: "deepseek-chat",
        mode: "chat",
        endpoint: "",
        apiKey: "",
        workerToken: "",
        temperature: 0.7,
        topP: 0.9,
        systemPrompt: "",
        creativePrompt: DEFAULT_CREATIVE_PROMPT,
        contextLimit: 128000,
        contextMessageLimit: 40
      },
      search: "",
      showArchived: false
    };

    let isLoading = false;
    let abortController = null;
    let activeAssistantMsg = null;
    let activeAssistantConvo = null;
    let activeMenu = null;
    let activeInfo = null;

    const el = {
      body: document.body,
      chat: document.getElementById("chat"),
      sidebarBackdrop: document.getElementById("sidebarBackdrop"),
      openSidebarBtn: document.getElementById("openSidebarBtn"),
      collapseSidebarBtn: document.getElementById("collapseSidebarBtn"),
      titleText: document.getElementById("titleText"),
      renameBtn: document.getElementById("renameBtn"),
      jumpTopBtn: document.getElementById("jumpTopBtn"),
      jumpPrevUserBtn: document.getElementById("jumpPrevUserBtn"),
      jumpBottomBtn: document.getElementById("jumpBottomBtn"),
      searchFocusBtn: document.getElementById("searchFocusBtn"),
      moreTopBtn: document.getElementById("moreTopBtn"),
      newChatBtn: document.getElementById("newChatBtn"),
      searchInput: document.getElementById("searchInput"),
      archiveFilterBtn: document.getElementById("archiveFilterBtn"),
      conversationList: document.getElementById("conversationList"),
      favoriteList: document.getElementById("favoriteList"),
      conversationSummaryInput: document.getElementById("conversationSummaryInput"),
      generateSummaryBtn: document.getElementById("generateSummaryBtn"),
      noteInputs: Array.from(document.querySelectorAll(".writing-note")),
      noteCounts: Array.from(document.querySelectorAll(".note-count")),
      noteExpandButtons: Array.from(document.querySelectorAll(".note-expand")),
      noteContextToggles: Array.from(document.querySelectorAll(".note-context-toggle")),
      messageInput: document.getElementById("messageInput"),
      sendBtn: document.getElementById("sendBtn"),
      attachBtn: document.getElementById("attachBtn"),
      modeQuickBtn: document.getElementById("modeQuickBtn"),
      fullscreenInputBtn: document.getElementById("fullscreenInputBtn"),
      settingsQuickBtn: document.getElementById("settingsQuickBtn"),
      contextPreviewBtn: document.getElementById("contextPreviewBtn"),
      modePill: document.getElementById("modePill"),
      modelPill: document.getElementById("modelPill"),
      statsPill: document.getElementById("statsPill"),
      modeButtons: Array.from(document.querySelectorAll(".mode-btn")),
      endpointInput: document.getElementById("endpointInput"),
      apiKeyInput: document.getElementById("apiKeyInput"),
      workerTokenInput: document.getElementById("workerTokenInput"),
      temperatureInput: document.getElementById("temperatureInput"),
      temperatureValue: document.getElementById("temperatureValue"),
      topPInput: document.getElementById("topPInput"),
      topPValue: document.getElementById("topPValue"),
      systemPromptInput: document.getElementById("systemPromptInput"),
      systemPromptCount: document.getElementById("systemPromptCount"),
      creativePromptInput: document.getElementById("creativePromptInput"),
      contextLimitInput: document.getElementById("contextLimitInput"),
      contextMessageLimitInput: document.getElementById("contextMessageLimitInput"),
      contextMessageLimitValue: document.getElementById("contextMessageLimitValue"),
      contextMeter: document.getElementById("contextMeter"),
      exportAllBtn: document.getElementById("exportAllBtn"),
      importBtn: document.getElementById("importBtn")
    };

    function nowTime() {
      return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
    }

    function uid() {
      return `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function estimateTokens(text) {
      const value = String(text || "");
      const cjk = (value.match(/[\u3400-\u9fff]/g) || []).length;
      const other = value.length - cjk;
      return Math.max(1, Math.ceil(cjk * 1.25 + other / 4));
    }

    function wordCount(text) {
      const value = String(text || "").trim();
      if (!value) return 0;
      const cjk = (value.match(/[\u3400-\u9fff]/g) || []).length;
      const words = (value.replace(/[\u3400-\u9fff]/g, " ").match(/[A-Za-z0-9_]+(?:[-'][A-Za-z0-9_]+)*/g) || []).length;
      return cjk + words;
    }

    function contextLimitToSliderIndex(limit) {
      if (limit === null || limit === "unlimited") return CONTEXT_MESSAGE_LIMITS.length - 1;
      const numeric = Number(limit);
      let closestIndex = 0;
      let closestDistance = Infinity;
      CONTEXT_MESSAGE_LIMITS.forEach((value, index) => {
        if (value === null) return;
        const distance = Math.abs(value - numeric);
        if (distance < closestDistance) {
          closestDistance = distance;
          closestIndex = index;
        }
      });
      return closestIndex;
    }

    function contextLimitLabel(limit) {
      return limit === null ? "不限制" : String(limit);
    }

    function getCurrentConvo() {
      return state.conversations.find(item => item.id === state.currentId);
    }

    function visibleMessages(convo = getCurrentConvo()) {
      return (convo?.messages || []).filter(msg => msg.role !== "system");
    }

    function save() {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        conversations: state.conversations,
        currentId: state.currentId,
        settings: state.settings
      }));
    }

    function load() {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        try {
          const data = JSON.parse(raw);
          state.conversations = Array.isArray(data.conversations) ? data.conversations : [];
          state.conversations.forEach(convo => {
            if (!Object.prototype.hasOwnProperty.call(convo, "archived")) convo.archived = false;
          });
          state.currentId = data.currentId || "";
          state.settings = { ...state.settings, ...(data.settings || {}) };
        } catch (error) {
          console.warn(error);
        }
      }
      if (!state.conversations.length) createConversation("新对话", false);
      if (!getCurrentConvo()) state.currentId = state.conversations[0].id;
    }

    function createConversation(title = "新对话", shouldRender = true) {
      const convo = {
        id: uid(),
        title,
        createdAt: Date.now(),
        updatedAt: Date.now(),
        model: state.settings.model,
        mode: state.settings.mode,
        favorite: false,
        archived: false,
        tags: [],
        autoTitle: true,
        aiTitleGenerated: false,
        conversationSummary: "",
        writingNotes: {
          characters: "",
          world: "",
          timeline: "",
          foreshadowing: "",
          style: "",
          narrative: ""
        },
        writingNoteEnabled: {
          characters: true,
          world: true,
          timeline: true,
          foreshadowing: true,
          style: true,
          narrative: true
        },
        draft: "",
        messages: []
      };
      state.conversations.unshift(convo);
      state.currentId = convo.id;
      save();
      if (shouldRender) renderAll();
      return convo;
    }

    function setTab(name) {
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === name));
      document.querySelectorAll(".side-panel").forEach(panel => panel.classList.toggle("active", panel.id === `tab-${name}`));
    }

    function closeSidebar() {
      el.body.classList.remove("sidebar-open");
      el.body.classList.add("sidebar-collapsed");
    }

    function openSidebar() {
      el.body.classList.remove("sidebar-collapsed");
      el.body.classList.add("sidebar-open");
    }

    function toggleSidebar() {
      if (el.body.classList.contains("sidebar-open")) closeSidebar();
      else openSidebar();
    }

    function modelLabel(model) {
      const map = {
        "deepseek-chat": "DeepSeek Chat",
        "deepseek-reasoner": "DeepSeek Reasoner",
        "deepseek-v4-flash": "DeepSeek V4 Flash",
        "deepseek-v4-pro": "DeepSeek V4 Pro"
      };
      return map[model] || model;
    }

    function modeLabel(mode) {
      return mode === "discuss" ? "Discuss" : mode === "creative" ? "Creative" : "Chat";
    }

    function updateSettingsForm() {
      el.endpointInput.value = state.settings.endpoint;
      el.apiKeyInput.value = state.settings.apiKey;
      el.workerTokenInput.value = state.settings.workerToken || "";
      el.temperatureInput.value = state.settings.temperature;
      el.temperatureValue.textContent = state.settings.temperature;
      el.topPInput.value = state.settings.topP;
      el.topPValue.textContent = state.settings.topP;
      el.systemPromptInput.value = state.settings.systemPrompt;
      el.creativePromptInput.value = state.settings.creativePrompt;
      el.contextLimitInput.value = state.settings.contextLimit;
      const limitIndex = contextLimitToSliderIndex(state.settings.contextMessageLimit);
      const normalizedLimit = CONTEXT_MESSAGE_LIMITS[limitIndex];
      state.settings.contextMessageLimit = normalizedLimit;
      el.contextMessageLimitInput.value = limitIndex;
      el.contextMessageLimitValue.textContent = contextLimitLabel(normalizedLimit);
      el.modeButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.mode === state.settings.mode));
      el.modePill.innerHTML = `<i class="fa-solid fa-layer-group"></i>${modeLabel(state.settings.mode)}`;
      updateSystemPromptHint();
    }

    function ensureWritingNotes(convo) {
      if (!convo.writingNotes) {
        convo.writingNotes = { characters: "", world: "", timeline: "", foreshadowing: "", style: "", narrative: "" };
      }
      if (!Object.prototype.hasOwnProperty.call(convo.writingNotes, "narrative")) convo.writingNotes.narrative = "";
      if (!convo.writingNoteEnabled) {
        convo.writingNoteEnabled = { characters: true, world: true, timeline: true, foreshadowing: true, style: true, narrative: true };
      }
      if (!Object.prototype.hasOwnProperty.call(convo.writingNoteEnabled, "narrative")) convo.writingNoteEnabled.narrative = true;
      return convo.writingNotes;
    }

    function updateWritingNotesForm() {
      const convo = getCurrentConvo();
      const notes = ensureWritingNotes(convo || {});
      const enabled = (convo && convo.writingNoteEnabled) || {};
      el.conversationSummaryInput.value = convo?.conversationSummary || "";
      el.noteInputs.forEach(input => {
        input.value = notes[input.dataset.noteKey] || "";
      });
      el.noteContextToggles.forEach(toggle => {
        toggle.checked = enabled[toggle.dataset.noteToggle] !== false;
      });
      updateWritingNoteCounts();
    }

    function updateWritingNoteCounts() {
      el.noteInputs.forEach(input => {
        const count = Array.from(input.value || "").length;
        const countEl = el.noteCounts.find(item => item.dataset.countFor === input.dataset.noteKey);
        if (!countEl) return;
        countEl.textContent = `${count} 字`;
        countEl.classList.toggle("warn", count > 4000 && count <= 8000);
        countEl.classList.toggle("danger", count > 8000);
        countEl.title = count > 8000
          ? "内容已经很长，会明显占用 Creative 上下文；这里只提醒，不会限制输入。"
          : count > 4000
            ? "略长了，建议按需精简；这里只提醒，不会限制输入。"
            : "建议控制在 4000 字以内；这里只提醒，不会限制输入。";
      });
    }

    function noteLabel(key) {
      return {
        characters: "角色设定",
        world: "世界观设定",
        timeline: "时间线",
        foreshadowing: "伏笔与待回收",
        style: "文风与禁忌",
        narrative: "叙事规则"
      }[key] || "设定";
    }

    function saveWritingNoteValue(key, value) {
      const convo = getCurrentConvo();
      if (!convo) return;
      const notes = ensureWritingNotes(convo);
      notes[key] = value;
      convo.updatedAt = Date.now();
      save();
      updateWritingNotesForm();
    }

    function openNoteFullscreen(key) {
      const input = el.noteInputs.find(item => item.dataset.noteKey === key);
      if (!input) return;
      const dialog = modal(noteLabel(key), `<textarea class="textarea modal-textarea" id="fullscreenNoteText">${escapeHtml(input.value)}</textarea>
        <div class="modal-actions">
          <span class="convo-meta" id="fullscreenNoteCount" style="margin-right:auto;">0 字</span>
          <button class="ghost-btn" data-close>取消</button>
          <button class="primary-btn" data-save>保存</button>
        </div>`, root => {
        const text = root.querySelector("#fullscreenNoteText");
        const count = root.querySelector("#fullscreenNoteCount");
        const updateCount = () => {
          const length = Array.from(text.value || "").length;
          count.textContent = `${length} 字`;
          count.classList.toggle("count-warn", length > 4000 && length <= 8000);
          count.classList.toggle("count-danger", length > 8000);
        };
        text.addEventListener("input", updateCount);
        updateCount();
        root.querySelector("[data-close]").addEventListener("click", () => root.remove());
        root.querySelector("[data-save]").addEventListener("click", () => {
          saveWritingNoteValue(key, text.value);
          root.remove();
        });
      });
      dialog.querySelector("#fullscreenNoteText").focus();
    }

    function openComposerFullscreen() {
      const dialog = modal("全屏输入", `<textarea class="textarea modal-textarea" id="fullscreenComposerText">${escapeHtml(el.messageInput.value)}</textarea>
        <div class="modal-actions">
          <span class="convo-meta" id="fullscreenComposerCount" style="margin-right:auto;">0 字</span>
          <button class="ghost-btn" data-close>取消</button>
          <button class="primary-btn" data-save>保存</button>
        </div>`, root => {
        const text = root.querySelector("#fullscreenComposerText");
        const count = root.querySelector("#fullscreenComposerCount");
        const updateCount = () => {
          const length = Array.from(text.value || "").length;
          count.textContent = `${length} 字`;
        };
        text.addEventListener("input", updateCount);
        updateCount();
        root.querySelector("[data-close]").addEventListener("click", () => root.remove());
        root.querySelector("[data-save]").addEventListener("click", () => {
          el.messageInput.value = text.value;
          resizeComposer();
          saveCurrentDraft();
          root.remove();
          el.messageInput.focus();
        });
      });
      dialog.querySelector("#fullscreenComposerText").focus();
    }

    function writingNotesPrompt(convo) {
      const notes = ensureWritingNotes(convo);
      const enabled = convo.writingNoteEnabled || {};
      const sections = [
        ["characters", "角色设定", notes.characters],
        ["world", "世界观设定", notes.world],
        ["timeline", "时间线", notes.timeline],
        ["foreshadowing", "伏笔与待回收", notes.foreshadowing],
        ["style", "文风与禁忌", notes.style],
        ["narrative", "叙事规则", notes.narrative]
      ].filter(([key]) => enabled[key] !== false).filter(([, , value]) => String(value || "").trim());
      if (!sections.length) return "";
      return "以下是当前对话的写作设定。请优先遵守，但不要机械复述：\n\n" + sections.map(([, title, value]) => `【${title}】\n${value.trim()}`).join("\n\n");
    }

    function conversationSummaryPrompt(convo) {
      const summary = String(convo?.conversationSummary || "").trim();
      return summary ? `以下是当前对话/作品摘要。请用它维持长篇连续性：\n\n${summary}` : "";
    }

    function maybeUpdateAutoTitle(convo, seedText = "") {
      if (!convo || convo.autoTitle === false) return false;
      const messages = visibleMessages(convo);
      if (!seedText && messages.length < 2) return false;
      const source = messages.filter(msg => msg.role === "user").map(msg => msg.content).join(" ").trim() || seedText;
      if (!source) return false;
      const cleaned = source
        .replace(/请|帮我|一下|这个|那个|进行|根据|下面|内容|问题|回复|总结|扩写|润色/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      const cjkChunks = cleaned.match(/[\u3400-\u9fffA-Za-z0-9]{2,}/g) || [];
      const title = cjkChunks.join(" ").slice(0, 18).trim() || source.slice(0, 18).trim();
      if (title && (convo.title === "新对话" || messages.length >= 4)) {
        convo.title = title;
        return true;
      }
      return false;
    }

    function titleSourceText(convo) {
      return visibleMessages(convo)
        .filter(msg => String(msg.content || "").trim())
        .slice(0, 8)
        .map(msg => `${msg.role === "user" ? "用户" : "AI"}：${msg.content.slice(0, 500)}`)
        .join("\n\n");
    }

    async function maybeGenerateAiTitle(convo) {
      if (!convo || convo.autoTitle === false || convo.aiTitleGenerated) return;
      if (!state.settings.endpoint && !state.settings.apiKey) return;
      const messages = visibleMessages(convo);
      if (messages.length < 4) return;
      const source = titleSourceText(convo);
      if (!source.trim()) return;
      try {
        const title = await callChatCompletion([
          { role: "system", content: "你负责给聊天/写作项目生成短标题。只输出标题本身，不要解释，不要加引号。" },
          { role: "user", content: `请根据下面对话生成一个具体、短、好识别的中文标题，6到14个字左右。避免“新对话”“问题讨论”这种泛称。\n\n${source}` }
        ], { temperature: 0.2, topP: 0.9 });
        const cleaned = title.replace(/["“”'《》]/g, "").split(/\n/)[0].trim().slice(0, 18);
        if (cleaned) {
          convo.title = cleaned;
          convo.aiTitleGenerated = true;
          convo.updatedAt = Date.now();
          save();
          renderHeaderAndStats();
          renderConversationList();
        }
      } catch (error) {
        console.warn(error);
      }
    }

    function updateSystemPromptHint() {
      const count = Array.from(el.systemPromptInput.value || "").length;
      el.systemPromptCount.textContent = `${count} 字`;
      el.systemPromptCount.classList.toggle("count-warn", count > 2000 && count <= 4000);
      el.systemPromptCount.classList.toggle("count-danger", count > 4000);
      if (count > 4000) {
        el.systemPromptCount.title = "已经比较长，会明显占用上下文并影响长对话记忆；这里只提醒，不会限制输入。";
      } else if (count > 2000) {
        el.systemPromptCount.title = "略长了，建议精简到 2000 字以内；这里只提醒，不会限制输入。";
      } else {
        el.systemPromptCount.title = "建议控制在 2000 字以内，过长会占用上下文；这里只提醒，不会限制输入。";
      }
    }

    function updateConversationFromSettings() {
      const convo = getCurrentConvo();
      if (!convo) return;
      convo.model = state.settings.model;
      convo.mode = state.settings.mode;
      convo.updatedAt = Date.now();
      save();
      renderHeaderAndStats();
    }

    function setMode(mode) {
      state.settings.mode = mode;
      updateConversationFromSettings();
      updateSettingsForm();
      const label = mode === "chat" ? "Chat" : mode === "discuss" ? "Discuss" : "Creative";
      toast(`${label} 模式`);
    }

    function renderHeaderAndStats() {
      const convo = getCurrentConvo();
      el.titleText.textContent = convo?.title || "新对话";
      el.modelPill.innerHTML = `<i class="fa-solid fa-circle-nodes"></i>${escapeHtml(modelLabel(state.settings.model))}`;
      const stats = getStats(convo);
      el.statsPill.innerHTML = `<i class="fa-solid fa-arrow-up"></i>${stats.percent}%`;
      el.contextMeter.style.width = `${Math.min(stats.percent, 100)}%`;
      el.contextMeter.classList.toggle("warn", stats.percent >= 60 && stats.percent < 85);
      el.contextMeter.classList.toggle("danger", stats.percent >= 85);
    }

    function getStats(convo = getCurrentConvo()) {
      const totalText = visibleMessages(convo).map(msg => msg.content).join("\n");
      const tokens = estimateTokens(totalText);
      const percent = Math.round((tokens / Math.max(1, state.settings.contextLimit)) * 100);
      return { tokens, percent, words: wordCount(totalText), chars: totalText.length };
    }

    function renderConversationList() {
      const term = state.search.trim().toLowerCase();
      const rows = state.conversations.filter(convo => {
        if (Boolean(convo.archived) !== state.showArchived) return false;
        if (!term) return true;
        const titleHit = convo.title.toLowerCase().includes(term);
        const msgHit = convo.messages.some(msg => String(msg.content).toLowerCase().includes(term));
        const favHit = convo.messages.some(msg => msg.favorite && String(msg.content).toLowerCase().includes(term));
        const tagHit = (convo.tags || []).some(tag => String(tag).toLowerCase().includes(term));
        return titleHit || msgHit || favHit || tagHit;
      });
      el.conversationList.innerHTML = rows.map(convo => {
        const count = visibleMessages(convo).length;
        const active = convo.id === state.currentId ? " active" : "";
        const tags = (convo.tags || []).map(tag => `<span class="tag-pill" data-tag-filter="${escapeHtml(tag)}">${escapeHtml(tag)}</span>`).join("");
        const archiveTitle = convo.archived ? "恢复对话" : "归档对话";
        const archiveIcon = convo.archived ? "fa-box-open" : "fa-box-archive";
        return `<div class="convo-item${active}">
          <button class="convo-main" data-convo-id="${convo.id}">
            <span class="convo-title">${convo.favorite ? `<i class="fa-solid fa-star" style="color:#d9a21b;margin-right:5px;"></i>` : ""}${escapeHtml(convo.title)}</span>
            <span class="convo-meta">${count} 条消息${convo.archived ? " · 已归档" : ""}</span>
            ${tags ? `<span class="tag-list">${tags}</span>` : ""}
          </button>
          <span class="convo-actions">
            <button class="convo-action ${convo.favorite ? "active" : ""}" data-convo-fav="${convo.id}" title="${convo.favorite ? "取消收藏对话" : "收藏对话"}"><i class="${convo.favorite ? "fa-solid" : "fa-regular"} fa-star"></i></button>
            <button class="convo-action" data-convo-tags="${convo.id}" title="编辑标签"><i class="fa-solid fa-tag"></i></button>
            <button class="convo-action" data-convo-archive="${convo.id}" title="${archiveTitle}"><i class="fa-solid ${archiveIcon}"></i></button>
            <button class="convo-action danger" data-convo-delete="${convo.id}" title="删除对话"><i class="fa-solid fa-trash"></i></button>
          </span>
        </div>`;
      }).join("");
      if (!rows.length) {

    function renderMessages() {
      const convo = getCurrentConvo();
      const messages = visibleMessages(convo);
      if (!messages.length) {
        el.chat.innerHTML = `<div class="empty">
          <h1>Bubble.lh</h1>
          <p>可以正常聊天、讨论剧情，也可以切到 Creative 做创作。</p>
        </div>`;
        return;
      }
      el.chat.innerHTML = messages.map((msg, index) => {
        const roleClass = msg.role === "user" ? "user" : "assistant";
        let content = escapeHtml(msg.content);
        if (msg.role === "assistant") {
          const thinkingLabel = msg.thinkingSeconds !== undefined ? `思考了 ${msg.thinkingSeconds.toFixed(1)}s` : "思考中";
          if (String(msg.reasoningContent || "").trim()) {
            content = `<details class="thinking-details">
              <summary><i class="fa-regular fa-lightbulb"></i>${thinkingLabel}</summary>
              <div class="thinking-content">${escapeHtml(msg.reasoningContent)}</div>
            </details>${content}`;
          } else if (msg.thinkingSeconds !== undefined) {
            content = `<div class="thinking"><i class="fa-regular fa-lightbulb"></i>${thinkingLabel}</div>${content}`;
          }
        }
        const tokens = estimateTokens(msg.content);
        const words = wordCount(msg.content);
        const metaPrefix = msg.role === "assistant" ? `${escapeHtml(modelLabel(msg.model || convo.model || state.settings.model))} · ` : "";
        const stopped = msg.stopped ? " · 已停止" : "";
        return `<article class="message ${roleClass}" data-index="${index}" id="msg-${index}">
          <div class="message-body">
            <div class="bubble">${content || `<span style="color: var(--muted)">正在生成...</span>`}</div>
            <div class="meta">${metaPrefix}${tokens} tokens · ${words} words · ${escapeHtml(msg.time || "")}${stopped}</div>
            ${renderTools(msg.role, index, Boolean(msg.favorite))}

    function jumpToPrevUserMessage() {
      const userMessages = Array.from(el.chat.querySelectorAll(".message.user"));
      if (!userMessages.length) return toast("还没有用户消息");
      const currentTop = el.chat.scrollTop;
      let target = null;
      for (let i = userMessages.length - 1; i >= 0; i--) {
        const top = userMessages[i].offsetTop;
        if (top < currentTop - 20) {
          target = userMessages[i];
          break;

      el.chat.scrollTo({ top: Math.max(0, target.offsetTop - 16), behavior: "smooth" });

    function modal(title, contentHtml, onReady) {
      const wrapper = document.createElement("div");
      wrapper.className = "modal";
      wrapper.innerHTML = `<div class="modal-card">

      wrapper.addEventListener("click", event => {

      });
      onReady?.(wrapper);
      return wrapper;
    }

    function searchSnippet(text, term) {
      const value = String(text || "");
      const lower = value.toLowerCase();
      const needle = term.toLowerCase();
      const hit = lower.indexOf(needle);
      if (hit < 0) return escapeHtml(value.slice(0, 120));
      const start = Math.max(0, hit - 48);
      const end = Math.min(value.length, hit + term.length + 72);
      const before = value.slice(start, hit);
      const match = value.slice(hit, hit + term.length);
      const after = value.slice(hit + term.length, end);
      return `${start > 0 ? "..." : ""}${escapeHtml(before)}<mark>${escapeHtml(match)}</mark>${escapeHtml(after)}${end < value.length ? "..." : ""}`;
    }

    function openMessageSearch() {
      const convo = getCurrentConvo();
      if (!convo) return;
      const dialog = modal("搜索当前对话", `<div class="message-search-box">
        <input class="field" id="messageSearchInput" placeholder="输入关键词">
        <div class="convo-meta" id="messageSearchCount">输入关键词后显示结果</div>
        <div class="message-search-results" id="messageSearchResults"></div>
      </div>`, root => {
        const input = root.querySelector("#messageSearchInput");
        const count = root.querySelector("#messageSearchCount");
        const results = root.querySelector("#messageSearchResults");
        const update = () => {
          const term = input.value.trim();
          if (!term) {
            count.textContent = "输入关键词后显示结果";
            results.innerHTML = "";
            return;
          }
          const matches = visibleMessages(convo)
            .map((msg, index) => ({ msg, index }))
            .filter(item => String(item.msg.content || "").toLowerCase().includes(term.toLowerCase()));
          count.textContent = `${matches.length} 个结果`;
          results.innerHTML = matches.map(item => `<button class="message-search-result" data-search-index="${item.index}">
            <div class="context-preview-role">${item.index + 1}. ${item.msg.role === "user" ? "User" : "AI"} · ${estimateTokens(item.msg.content)} tokens</div>
            <div class="message-search-snippet">${searchSnippet(item.msg.content, term)}</div>
          </button>`).join("") || `<div class="convo-meta">没有找到匹配消息。</div>`;
        };
        input.addEventListener("input", update);
        results.addEventListener("click", event => {
          const btn = event.target.closest("[data-search-index]");
          if (!btn) return;
          const index = Number(btn.dataset.searchIndex);
          root.remove();
          setTimeout(() => scrollToMessageIndex(index), 30);
        });
      });
      dialog.querySelector("#messageSearchInput").focus();
    }

      const convo = getCurrentConvo();
      const msg = visibleMessages(convo)[index];
      if (!convo || !msg) return;
      const addition = msg.content.trim();
      if (!addition) return toast("这条消息没有内容");
      if (key === "summary") {
        convo.conversationSummary = convo.conversationSummary ? `${convo.conversationSummary.trim()}\n\n${addition}` : addition;
      } else {
        const notes = ensureWritingNotes(convo);
        notes[key] = notes[key] ? `${notes[key].trim()}\n\n${addition}` : addition;
      }
      convo.updatedAt = Date.now();
      save();

      setTab("notes");

    function toggleConversationFavorite(id, requireConfirm = false) {
      const convo = state.conversations.find(item => item.id === id);
      if (!convo) return;
      if (convo.favorite && requireConfirm && !confirm("取消收藏这个对话？")) return;
      convo.favorite = !convo.favorite;
      convo.updatedAt = Date.now();
      save();
      renderAll();
      toast(convo.favorite ? "已收藏对话" : "已取消收藏对话");
    }

    function toggleConversationArchive(id, requireConfirm = false) {
      const convo = state.conversations.find(item => item.id === id);
      if (!convo) return;
      const willArchive = !convo.archived;
      if (willArchive && requireConfirm && !confirm("归档这个对话？归档后会从默认列表隐藏，可以在“查看归档”里恢复。")) return;
      convo.archived = willArchive;
      convo.updatedAt = Date.now();
      if (willArchive && state.currentId === id) {
        const next = state.conversations.find(item => !item.archived && item.id !== id);
        if (next) {
          state.currentId = next.id;
        } else {
          createConversation("新对话", false);
        }
        state.showArchived = false;
      }
      save();
      renderAll();
      syncComposerDraft(true);
      toast(willArchive ? "已归档对话" : "已恢复对话");
    }

    function deleteConversation(id) {
      const convo = state.conversations.find(item => item.id === id);
      if (!convo) return;
      if (!confirm(`删除对话「${convo.title}」？这个操作不会进入回收站。`)) return;
      state.conversations = state.conversations.filter(item => item.id !== id);
      if (!state.conversations.length) {
        createConversation("新对话", false);
      } else if (state.currentId === id) {
        state.currentId = (state.conversations.find(item => !item.archived) || state.conversations[0]).id;
        state.showArchived = Boolean(state.conversations.find(item => item.id === state.currentId)?.archived);
      }
      save();
      renderAll();
      toast("已删除对话");
    }

      ];

    async function regenerate(index) {
      const convo = getCurrentConvo();
      const visible = visibleMessages(convo);
      const msg = visible[index];
      const realIndex = convo.messages.indexOf(msg);
      const prevUser = convo.messages.slice(0, realIndex).reverse().find(item => item.role === "user");
      if (!prevUser) return toast("没有可重生的用户消息");
      convo.messages = convo.messages.slice(0, realIndex);

      renderAll();

    function buildRequestMessages(convo) {
      const messages = [];
      const systemParts = [state.settings.systemPrompt.trim()];
      if (state.settings.mode === "discuss" || state.settings.mode === "creative") {
        systemParts.push(conversationSummaryPrompt(convo));
        systemParts.push(writingNotesPrompt(convo));
      }
      if (state.settings.mode === "creative") {
        systemParts.push(state.settings.creativePrompt.trim());
      }
      const system = systemParts.filter(Boolean).join("\n\n");
      if (system) messages.push({ role: "system", content: system });
      for (const msg of convo.messages) {
        if (msg.role === "user" || msg.role === "assistant") {
          if (msg.role === "assistant" && !String(msg.content || "").trim()) continue;
          messages.push({ role: msg.role, content: msg.content });
        }
      }
      const systemMessages = messages.filter(msg => msg.role === "system");
      const chatMessages = messages.filter(msg => msg.role !== "system");
      const limit = state.settings.contextMessageLimit;
      if (limit === null || limit === "unlimited") return systemMessages.concat(chatMessages);
      if (Number(limit) <= 0) {
        const latestUser = chatMessages.slice().reverse().find(msg => msg.role === "user");
        return systemMessages.concat(latestUser ? [latestUser] : []);
      }
      return systemMessages.concat(chatMessages.slice(-Number(limit)));
    }

    function contextRoleLabel(role) {
      return role === "system" ? "System" : role === "assistant" ? "AI" : "User";
    }

    function clippedPreviewText(text, max = 1600) {
      const value = String(text || "");
      return value.length > max ? `${value.slice(0, max)}\n\n...已截断预览，实际发送仍包含完整内容` : value;
    }

    function showContextPreview() {
      const convo = getCurrentConvo();
      if (!convo) return;
      const draft = el.messageInput.value.trim();
      const previewConvo = {
        ...convo,
        writingNotes: { ...(convo.writingNotes || {}) },
        writingNoteEnabled: { ...(convo.writingNoteEnabled || {}) },
        messages: convo.messages.map(msg => ({ ...msg }))
      };
      if (draft) {
        previewConvo.messages.push({ role: "user", content: draft, time: nowTime(), model: state.settings.model });
      }
      const messages = buildRequestMessages(previewConvo);
      const systemCount = messages.filter(msg => msg.role === "system").length;
      const historyCount = messages.filter(msg => msg.role !== "system").length;
      const totalTokens = estimateTokens(messages.map(msg => msg.content).join("\n\n"));
      const noteSections = [
        ["characters", "角色"],
        ["world", "世界观"],
        ["timeline", "时间线"],
        ["foreshadowing", "伏笔"],
        ["style", "文风"],
        ["narrative", "叙事规则"]
      ];
      const enabledNotes = noteSections
        .filter(([key]) => previewConvo.writingNoteEnabled?.[key] !== false && String(previewConvo.writingNotes?.[key] || "").trim())
        .map(([, label]) => label);
      const modeNotes = state.settings.mode === "chat"
        ? "Chat 模式不会自动带入摘要和设定"
        : `已带入：${[
          previewConvo.conversationSummary?.trim() ? "摘要" : "",
          ...enabledNotes
        ].filter(Boolean).join("、") || "无摘要或设定"}`;
      const items = messages.map((msg, index) => `<div class="context-preview-item">
        <div class="context-preview-role">${index + 1}. ${contextRoleLabel(msg.role)} · ${estimateTokens(msg.content)} tokens</div>
        <div class="context-preview-text">${escapeHtml(clippedPreviewText(msg.content))}</div>
      </div>`).join("");
      modal("带入预览", `<div class="context-preview">
        <div class="context-preview-summary">
          <div class="context-preview-stat">模式<strong>${escapeHtml(modeLabel(state.settings.mode))}</strong></div>
          <div class="context-preview-stat">模型<strong>${escapeHtml(modelLabel(state.settings.model))}</strong></div>
          <div class="context-preview-stat">消息<strong>${systemCount} system · ${historyCount} history</strong></div>
          <div class="context-preview-stat">估算<strong>${totalTokens} tokens</strong></div>
        </div>
        <div class="convo-meta">${escapeHtml(modeNotes)}${draft ? "；包含当前输入框内容" : ""}</div>
        <div class="context-preview-list">${items || `<div class="convo-meta">没有可发送的上下文。</div>`}</div>
        <div class="modal-actions">
          <button class="primary-btn" data-close>关闭</button>
        </div>
      </div>`, root => {
        root.querySelector("[data-close]").addEventListener("click", () => root.remove());
      });
