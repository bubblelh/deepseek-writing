    function apiConfigHeaders() {
      const endpoint = state.settings.endpoint.trim() || "https://api.deepseek.com/v1/chat/completions";
      const headers = { "Content-Type": "application/json" };
      if (state.settings.endpoint.trim()) {
        if (state.settings.workerToken?.trim()) headers["X-Bubble-Token"] = state.settings.workerToken.trim();
      } else if (state.settings.apiKey.trim()) {
        headers.Authorization = `Bearer ${state.settings.apiKey.trim()}`;
      }
      return { endpoint, headers };
    }

    async function callChatCompletion(messages, options = {}) {
      if (!state.settings.endpoint && !state.settings.apiKey) {
        throw new Error("请先设置 Cloudflare Worker URL，或临时填写 API Key");
      }
      const { endpoint, headers } = apiConfigHeaders();
      const response = await fetch(endpoint, {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: state.settings.model,
          messages,
          temperature: options.temperature ?? Number(state.settings.temperature),
          top_p: options.topP ?? Number(state.settings.topP),
          stream: false
        })
      });
      if (!response.ok) {
        const errText = await response.text().catch(() => "");
        throw new Error(`${response.status} ${errText || response.statusText}`);
      }
      const json = await response.json();
      return json.choices?.[0]?.message?.content || "";
    }

    function summarySourceText(convo) {
      return visibleMessages(convo)
        .filter(msg => String(msg.content || "").trim())
        .map(msg => `${msg.role === "user" ? "用户" : "AI"}：${msg.content}`)
        .join("\n\n");
    }

          {

    async function sendMessage(text, options = {}) {
      const { appendUser = true } = options;
      if (isLoading) {
        stopGeneration();
        return;
      }
      const convo = getCurrentConvo();
      const cleanText = String(text || "").trim();
      if (!cleanText) return;
      if (appendUser) {
        convo.messages.push({ role: "user", content: cleanText, time: nowTime(), model: state.settings.model });
      }
      convo.draft = "";
      maybeUpdateAutoTitle(convo, cleanText);
      const assistantMsg = { role: "assistant", content: "", time: nowTime(), model: state.settings.model };
      convo.messages.push(assistantMsg);
      convo.updatedAt = Date.now();
      save();
      renderAll();

      if (!state.settings.endpoint && !state.settings.apiKey) {
        assistantMsg.content = "本地预览模式：消息、收藏、复制、分支、删除和导入导出都可以测试。要让 DeepSeek 真正回复，请在设置里填写 Cloudflare Worker URL，或临时填写 API Key。";
        assistantMsg.thinkingSeconds = 0;
        convo.updatedAt = Date.now();
        save();
        renderAll();
        toast("当前是本地预览模式");
        return;
      }

      isLoading = true;
      abortController = new AbortController();
      activeAssistantMsg = assistantMsg;
      activeAssistantConvo = convo;
      el.sendBtn.innerHTML = `<i class="fa-solid fa-stop"></i>`;
      el.sendBtn.title = "停止生成";
      el.sendBtn.classList.add("generating");
      const started = performance.now();

      try {
        const { endpoint, headers } = apiConfigHeaders();
        const body = {
          model: state.settings.model,
          messages: buildRequestMessages(convo),
          temperature: Number(state.settings.temperature),
          top_p: Number(state.settings.topP),
          stream: true
        };
        const response = await fetch(endpoint, {
          method: "POST",
          headers,
          body: JSON.stringify(body),
          signal: abortController.signal
        });
        if (!response.ok) {
          const errText = await response.text().catch(() => "");
          throw new Error(`${response.status} ${errText || response.statusText}`);
        }
        if (!response.body) {
          const json = await response.json();
          const message = json.choices?.[0]?.message || {};
          assistantMsg.content = message.content || "";
          assistantMsg.reasoningContent = message.reasoning_content || message.reasoningContent || "";
        } else {
          await readStream(response, assistantMsg, convo);
        }
        assistantMsg.thinkingSeconds = (performance.now() - started) / 1000;
        if (!assistantMsg.content.trim()) assistantMsg.content = "没有收到有效回复。";
        maybeUpdateAutoTitle(convo);
        await maybeGenerateAiTitle(convo);
      } catch (error) {
        if (error.name === "AbortError") {
          assistantMsg.stopped = true;
          if (!assistantMsg.content.trim()) assistantMsg.content = "已停止生成。";
        } else {
          assistantMsg.content = `请求失败：${error.message}`;
        }
      } finally {
        isLoading = false;
        abortController = null;
        activeAssistantMsg = null;
        activeAssistantConvo = null;
        el.sendBtn.innerHTML = `<i class="fa-solid fa-arrow-up"></i>`;
        el.sendBtn.title = "发送";
        el.sendBtn.classList.remove("generating");
        convo.updatedAt = Date.now();
        save();
        renderAll();
      }
    }

    function stopGeneration() {
      if (!isLoading) return;
      if (activeAssistantMsg) {
        activeAssistantMsg.stopped = true;
        if (!activeAssistantMsg.content.trim()) activeAssistantMsg.content = "已停止生成。";
      }
      if (activeAssistantConvo) {
        activeAssistantConvo.updatedAt = Date.now();
        save();
        renderMessages();
      }
      abortController?.abort();
      toast("已停止生成");
    }

    async function readStream(response, assistantMsg, convo) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith("data:")) continue;
          const payload = trimmed.slice(5).trim();
          if (payload === "[DONE]") continue;
          try {
            const parsed = JSON.parse(payload);
            const choice = parsed.choices?.[0] || {};
            const delta = choice.delta || choice.message || {};
            const contentDelta = delta.content || "";
            const reasoningDelta = delta.reasoning_content || delta.reasoningContent || "";
            if (!contentDelta && !reasoningDelta) continue;
            if (reasoningDelta) assistantMsg.reasoningContent = (assistantMsg.reasoningContent || "") + reasoningDelta;
            if (contentDelta) assistantMsg.content += contentDelta;
            save();
            renderMessages();
            renderHeaderAndStats();
          } catch (error) {
            console.warn(error);
          }
        }
      }
    }

    function exportJson(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportText(filename, text, type = "text/plain;charset=utf-8") {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function filenameSafe(value) {
      return String(value || "conversation").replace(/[\\/:*?"<>|]/g, "_").slice(0, 80) || "conversation";
    }

    function mdSection(title, content) {
      const value = String(content || "").trim();
      return value ? `## ${title}\n\n${value}\n\n` : "";
    }

    function conversationToMarkdown(convo) {
      const notes = ensureWritingNotes(convo);
      const lines = [];
      lines.push(`# ${convo.title || "新对话"}`);
      lines.push("");
      lines.push(`- 导出时间：${new Date().toLocaleString("zh-CN")}`);
      lines.push(`- 模型：${modelLabel(convo.model || state.settings.model)}`);
      lines.push(`- 模式：${modeLabel(convo.mode || state.settings.mode)}`);
      if (convo.tags?.length) lines.push(`- 标签：${convo.tags.join("、")}`);
      if (convo.favorite) lines.push("- 状态：已收藏");
      if (convo.archived) lines.push("- 状态：已归档");
      lines.push("");
      lines.push(mdSection("对话摘要", convo.conversationSummary).trim());
      const noteParts = [
        ["角色设定", notes.characters],
        ["世界观设定", notes.world],
        ["时间线", notes.timeline],
        ["伏笔与待回收", notes.foreshadowing],
        ["文风与禁忌", notes.style],
        ["叙事规则", notes.narrative]
      ].filter(([, value]) => String(value || "").trim());
      if (noteParts.length) {
        lines.push("## 设定");
        lines.push("");
        noteParts.forEach(([title, value]) => {
          lines.push(`### ${title}`);
          lines.push("");
          lines.push(String(value).trim());
          lines.push("");
        });
      }
      lines.push("## 消息");
      lines.push("");
      visibleMessages(convo).forEach(msg => {
        const role = msg.role === "user" ? "User" : "AI";
        const meta = [msg.time, msg.model ? modelLabel(msg.model) : ""].filter(Boolean).join(" · ");
        lines.push(`### ${role}`);
        if (meta) {
          lines.push("");
          lines.push(`_${meta}_`);
        }
        lines.push("");
        if (msg.reasoningContent?.trim()) {
          lines.push("<details>");
          lines.push("<summary>思考内容</summary>");
          lines.push("");
          lines.push(msg.reasoningContent.trim());
          lines.push("");
          lines.push("</details>");
          lines.push("");
        }
        lines.push(String(msg.content || "").trim() || "_空消息_");
        lines.push("");
      });
      return lines.filter((line, index, arr) => !(line === "" && arr[index - 1] === "" && arr[index - 2] === "")).join("\n");
    }

    function exportCurrent() {
      const convo = getCurrentConvo();
      exportJson(`${convo.title || "conversation"}.json`, convo);
    }

    function exportCurrentMarkdown() {
      const convo = getCurrentConvo();
      if (!convo) return;
      exportText(`${filenameSafe(convo.title)}.md`, `\uFEFF${conversationToMarkdown(convo)}`, "text/markdown;charset=utf-8");
    }

    function importData() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "application/json";
      input.addEventListener("change", async () => {
        const file = input.files?.[0];
        if (!file) return;
        const data = JSON.parse(await file.text());
        if (Array.isArray(data.conversations)) {
          state.conversations = data.conversations;
          state.conversations.forEach(convo => {
            if (!Object.prototype.hasOwnProperty.call(convo, "archived")) convo.archived = false;
          });
          state.settings = { ...state.settings, ...(data.settings || {}) };
          state.currentId = data.currentId || state.conversations[0]?.id || "";
        } else if (data.messages) {
          state.conversations.unshift({ ...data, id: uid(), title: `${data.title || "导入对话"} 导入`, archived: Boolean(data.archived) });
          state.currentId = state.conversations[0].id;
        }
        save();
        renderAll();
        toast("已导入");
      });
      input.click();
    }

    function bindEvents() {
      document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => setTab(btn.dataset.tab)));
      el.openSidebarBtn.addEventListener("click", toggleSidebar);
      el.collapseSidebarBtn.addEventListener("click", closeSidebar);
      el.sidebarBackdrop.addEventListener("click", () => {
        if (window.innerWidth <= 820) closeSidebar();
      });
      document.addEventListener("click", event => {
        if (!event.target.closest(".tool-menu") && !event.target.closest("[data-action='more']") && !event.target.closest("#moreTopBtn") && !event.target.closest("#modelPill") && !event.target.closest("#modePill") && !event.target.closest("#modeQuickBtn")) closeMenu();
        if (!event.target.closest(".info-popover") && !event.target.closest(".info-btn")) closeInfo();
      });
      document.querySelectorAll(".info-btn").forEach(btn => btn.addEventListener("click", event => {
        event.stopPropagation();
        showInfo(btn);
      }));
      el.newChatBtn.addEventListener("click", () => {
        state.showArchived = false;
        createConversation();
      });
      el.searchInput.addEventListener("input", () => {
        state.search = el.searchInput.value;
        renderConversationList();
      });
      el.archiveFilterBtn.addEventListener("click", () => {
        state.showArchived = !state.showArchived;
        renderConversationList();
      });
      el.conversationList.addEventListener("click", event => {
        const tagFilter = event.target.closest("[data-tag-filter]");
        if (tagFilter) {
          state.search = tagFilter.dataset.tagFilter;
          el.searchInput.value = state.search;
          renderConversationList();
          return;
        }
        const favBtn = event.target.closest("[data-convo-fav]");
        if (favBtn) {
          toggleConversationFavorite(favBtn.dataset.convoFav, true);
          return;
        }
        const tagBtn = event.target.closest("[data-convo-tags]");
        if (tagBtn) {
          editConversationTags(tagBtn.dataset.convoTags);
          return;
        }
        const archiveBtn = event.target.closest("[data-convo-archive]");
        if (archiveBtn) {
          toggleConversationArchive(archiveBtn.dataset.convoArchive, true);
          return;
        }
        const deleteBtn = event.target.closest("[data-convo-delete]");
        if (deleteBtn) {
          deleteConversation(deleteBtn.dataset.convoDelete);
          return;
        }
        const id = event.target.closest("[data-convo-id]")?.dataset.convoId;
        if (!id) return;
        saveCurrentDraft();
        state.currentId = id;
        save();
        renderAll();
        syncComposerDraft(true);
      });
      el.favoriteList.addEventListener("click", event => {
        const tagFilter = event.target.closest("[data-tag-filter]");
        if (tagFilter) {
          state.search = tagFilter.dataset.tagFilter;
          el.searchInput.value = state.search;
          setTab("chats");
          renderConversationList();
          return;
        }
        const unfavConvoBtn = event.target.closest("[data-unfav-convo-only]");
        if (unfavConvoBtn) {
          toggleConversationFavorite(unfavConvoBtn.dataset.unfavConvoOnly, true);
          return;
        }
        const favConvoBtn = event.target.closest("[data-fav-convo-only]");
        if (favConvoBtn) {
          saveCurrentDraft();
          state.currentId = favConvoBtn.dataset.favConvoOnly;
          save();
          renderAll();
          syncComposerDraft(true);
          return;
        }
        const removeBtn = event.target.closest("[data-unfav-convo]");
        if (removeBtn) {
          const convo = state.conversations.find(item => item.id === removeBtn.dataset.unfavConvo);
          const msg = convo?.messages[Number(removeBtn.dataset.unfavIndex)];
          if (msg) {
            if (!confirm("取消收藏这条消息？")) return;
            msg.favorite = false;
            convo.updatedAt = Date.now();
            save();
            renderAll();
            toast("已取消收藏");
          }
          return;
        }
        const btn = event.target.closest("[data-fav-convo]");
        if (!btn) return;
        state.currentId = btn.dataset.favConvo;
        save();
        renderAll();
        syncComposerDraft(true);
        setTimeout(() => document.getElementById(`msg-${btn.dataset.favIndex}`)?.scrollIntoView({ block: "center" }), 30);
      });
      el.generateSummaryBtn.addEventListener("click", generateConversationSummary);
      el.conversationSummaryInput.addEventListener("input", () => {
        const convo = getCurrentConvo();
        if (!convo) return;
        convo.conversationSummary = el.conversationSummaryInput.value;
        convo.updatedAt = Date.now();
        save();
      });
      el.noteInputs.forEach(input => {
        input.addEventListener("input", () => {
          const convo = getCurrentConvo();
          if (!convo) return;
          const notes = ensureWritingNotes(convo);
          notes[input.dataset.noteKey] = input.value;
          convo.updatedAt = Date.now();
          save();
          updateWritingNoteCounts();
        });
      });
      el.noteExpandButtons.forEach(button => {
        button.addEventListener("click", () => openNoteFullscreen(button.dataset.expandNote));
      });
      el.chat.addEventListener("click", event => {
        const btn = event.target.closest("[data-action]");
        if (!btn) return;
        const index = Number(btn.dataset.index);
        const action = btn.dataset.action;
        if (action === "copy") copyMessage(index);
        if (action === "edit") editMessage(index);
        if (action === "regen") regenerate(index);
        if (action === "favorite") toggleFavorite(index);
        if (action === "more") showMoreMenu(btn, index);
      });
      el.sendBtn.addEventListener("click", () => {
        if (isLoading) return stopGeneration();
        const text = el.messageInput.value;
        clearComposer();
        sendMessage(text);
      });
      el.attachBtn.addEventListener("click", uploadTxtFile);
      el.modePill.addEventListener("click", event => showModeMenu(event.currentTarget));
      el.modelPill.addEventListener("click", event => showModelMenu(event.currentTarget));
      el.fullscreenInputBtn.addEventListener("click", openComposerFullscreen);
      el.messageInput.addEventListener("keydown", event => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          el.sendBtn.click();
        }
      });
      el.messageInput.addEventListener("input", () => {
        resizeComposer();
        saveCurrentDraft();
      });
      el.renameBtn.addEventListener("click", () => {
        const convo = getCurrentConvo();
        const next = prompt("重命名对话", convo.title);
        if (!next) return;
        convo.title = next.trim();
        convo.autoTitle = false;
        save();
        renderAll();
      });
      el.jumpTopBtn.addEventListener("click", jumpToTop);
      el.jumpPrevUserBtn.addEventListener("click", jumpToPrevUserMessage);
      el.jumpBottomBtn.addEventListener("click", jumpToBottom);
      el.searchFocusBtn.addEventListener("click", () => {
        openMessageSearch();
      });
      el.moreTopBtn.addEventListener("click", event => showTopMenu(event.currentTarget));
      el.modeQuickBtn.addEventListener("click", event => showWritingCommandMenu(event.currentTarget));
      el.settingsQuickBtn.addEventListener("click", () => {
        setTab("settings");
        openSidebar();
      });
      el.contextPreviewBtn.addEventListener("click", showContextPreview);
      el.modeButtons.forEach(btn => btn.addEventListener("click", () => setMode(btn.dataset.mode)));
      [
        ["endpointInput", "endpoint"],
        ["apiKeyInput", "apiKey"],
        ["workerTokenInput", "workerToken"],
        ["creativePromptInput", "creativePrompt"]
      ].forEach(([input, key]) => {
        el[input].addEventListener("change", () => {
          state.settings[key] = el[input].value;
          save();
        });
      });
      el.systemPromptInput.addEventListener("input", () => {
        state.settings.systemPrompt = el.systemPromptInput.value;
        updateSystemPromptHint();
        save();
      });
      el.temperatureInput.addEventListener("change", () => {
        state.settings.temperature = Math.max(0, Math.min(2, Number(el.temperatureInput.value) || 0));
        save();
        updateSettingsForm();
      });
      el.topPInput.addEventListener("change", () => {
        state.settings.topP = Math.max(0, Math.min(1, Number(el.topPInput.value) || 0));
        save();
        updateSettingsForm();
      });
      el.contextLimitInput.addEventListener("change", () => {
        state.settings.contextLimit = Math.max(1000, Number(el.contextLimitInput.value) || 128000);
        save();
        renderHeaderAndStats();
      });
      el.contextMessageLimitInput.addEventListener("input", () => {
        const index = Math.max(0, Math.min(CONTEXT_MESSAGE_LIMITS.length - 1, Number(el.contextMessageLimitInput.value) || 0));
        state.settings.contextMessageLimit = CONTEXT_MESSAGE_LIMITS[index];
        el.contextMessageLimitValue.textContent = contextLimitLabel(state.settings.contextMessageLimit);
        save();
      });
      el.exportAllBtn.addEventListener("click", () => exportJson("bubblelh-backup.json", {
        conversations: state.conversations,
        currentId: state.currentId,
        settings: state.settings
      }));
      el.importBtn.addEventListener("click", importData);
    }

    load();
    bindEvents();
    closeSidebar();
    renderAll();

    // ===== Mobile scroll jump tools v2 =====
    const mobileScrollTools = document.getElementById("mobileScrollTools");
    const mobileJumpTopBtn = document.getElementById("mobileJumpTopBtn");
    const mobileJumpPrevUserBtn = document.getElementById("mobileJumpPrevUserBtn");
    const mobileJumpBottomBtn = document.getElementById("mobileJumpBottomBtn");
    const mobileFullscreenInputBtn = document.getElementById("mobileFullscreenInputBtn");
    let mobileScrollTimer = null;

    function showMobileScrollTools() {
      if (window.innerWidth > 820) return;
      mobileScrollTools?.classList.add("show");
      mobileJumpBottomBtn?.classList.add("show");
      clearTimeout(mobileScrollTimer);
      mobileScrollTimer = setTimeout(() => {
        mobileScrollTools?.classList.remove("show");
        mobileJumpBottomBtn?.classList.remove("show");
      }, 2000);
    }

    el.chat.addEventListener("scroll", showMobileScrollTools, { passive: true });
    mobileJumpTopBtn?.addEventListener("click", () => {
      jumpToTop();
      showMobileScrollTools();
    });
    mobileJumpPrevUserBtn?.addEventListener("click", () => {
      jumpToPrevUserMessage();
      showMobileScrollTools();
    });
    mobileJumpBottomBtn?.addEventListener("click", () => {
      jumpToBottom();
      mobileScrollTools?.classList.remove("show");
      mobileJumpBottomBtn?.classList.remove("show");
    });
    mobileFullscreenInputBtn?.addEventListener("click", openComposerFullscreen);

  </script>
</body>
</html>
