<!DOCTYPE html>
<html lang="zh-CN"><!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8f4ec" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1e1e2a" media="prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23d9a56c'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-weight='bold'%3Eds%3C/text%3E%3C/svg%3E">
    <title>bubble.lh · Think</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f8f4ec;
            --surface: #ffffff;
            --border: #e9e6df;
            --text: #1c1c1e;
            --text-secondary: #8e8e93;
            --bubble-user: #007aff;
            --bubble-user-text: white;
            --bubble-ai: #e5e5ea;
            --bubble-ai-text: #1c1c1e;
            --input-bg: #ffffff;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --accent: #007aff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1e;
                --surface: #2c2c2e;
                --border: #3a3a3c;
                --text: #ffffff;
                --text-secondary: #8e8e93;
                --bubble-user: #007aff;
                --bubble-user-text: white;
                --bubble-ai: #3a3a3c;
                --bubble-ai-text: #ffffff;
                --input-bg: #2c2c2e;
                --shadow: 0 2px 8px rgba(0,0,0,0.3);
                --accent: #0a84ff;
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部栏 */
        .header {
            background: rgba(var(--bg), 0.8);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .menu-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            padding: 8px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-title {
            font-weight: 600;
            font-size: 17px;
            background: none;
            border: none;
            color: var(--text);
            padding: 8px 12px;
            border-radius: 30px;
            background: var(--surface);
            max-width: 50%;
            white-space: nowrap;
            overflow-x: auto;
            cursor: pointer;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            background: var(--surface);
            border: none;
            border-radius: 30px;
            padding: 8px 12px;
            font-size: 14px;
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
        }
        .nav-btn:active { opacity: 0.7; }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: -80%;
            width: 80%;
            height: 100%;
            background: var(--surface);
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 2px 0 12px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 16px;
            gap: 20px;
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            display: none;
        }
        .sidebar-overlay.open {
            display: block;
        }
        .sidebar-section {
            border-bottom: 0.5px solid var(--border);
            padding-bottom: 16px;
        }
        .section-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 16px;
        }
        textarea, input, select {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 0.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
        }
        button.secondary {
            background: var(--bubble-ai);
            color: var(--text);
        }
        .convo-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s;
            touch-action: pan-x;
        }
        .convo-item.active {
            background: var(--accent);
            color: white;
        }
        .convo-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 15px;
        }
        .delete-convo {
            background: none;
            color: var(--text-secondary);
            font-size: 20px;
            padding: 4px 8px;
            display: none;
        }
        .convo-item:hover .delete-convo,
        .convo-item.swipe-left .delete-convo {
            display: block;
        }
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .tag-filter {
            flex: 1;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            justify-content: flex-end;
        }
        .message.ai {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
            font-size: 15px;
            position: relative;
        }
        .user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 4px;
        }
        .ai .bubble {
            background: var(--bubble-ai);
            color: var(--bubble-ai-text);
            border-bottom-left-radius: 4px;
        }
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            justify-content: flex-end;
            font-size: 12px;
        }
        .msg-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .collapsed-msg {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* 输入区域 */
        .input-area {
            background: var(--surface);
            border-top: 0.5px solid var(--border);
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        textarea {
            flex: 1;
            max-height: 120px;
            resize: none;
        }
        .stats {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
        }
        .warning {
            color: #ff3b30;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 20px;
            max-height: 80%;
            overflow-y: auto;
        }
        .fullscreen-textarea {
            width: 100%;
            height: 200px;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 3000;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" id="menuBtn">☰</button>
    <button class="chat-title" id="chatTitleBtn">新对话</button>
    <div class="nav-buttons">
        <button class="nav-btn" id="scrollTopBtn">↑</button>
        <button class="nav-btn" id="scrollPrevUserBtn">↺</button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-section">
        <div class="section-title">对话</div>
        <button id="newChatBtn" style="margin-bottom: 12px;">+ 新建对话</button>
        <input type="text" id="searchInput" placeholder="搜索对话标题或内容" style="margin-bottom: 12px;">
        <input type="text" id="tagFilterInput" placeholder="按标签筛选" style="margin-bottom: 8px;">
        <div id="convoList"></div>
    </div>
    <div class="sidebar-section">
        <div class="section-title">全局写作风格 (所有对话共用)</div>
        <textarea id="globalPrompt" rows="3" placeholder="例如：笔触干练、克制，禁止总结感悟、禁止上帝视角..."></textarea>
        <button id="saveGlobalPromptBtn" style="margin-top: 6px;">保存全局风格</button>
    </div>
    <div class="sidebar-section">
        <div class="section-title">本故事设定 (仅当前对话)</div>
        <textarea id="storyPrompt" rows="3" placeholder="角色介绍、世界观、当前阶段等"></textarea>
        <div style="font-size: 12px; color: var(--text-secondary);">此内容只对当前对话生效</div>
    </div>
    <div class="sidebar-section">
        <div class="section-title">模型</div>
        <select id="modelSelect">
            <option value="deepseek-v4-flash">Flash (快速/便宜)</option>
            <option value="deepseek-v4-pro">Pro (强大/长文)</option>
        </select>
    </div>
    <div class="sidebar-section">
        <div class="section-title">API Key</div>
        <input type="password" id="apiKeyInput" placeholder="sk-...">
        <button id="saveApiKeyBtn" style="margin-top: 6px;">保存密钥</button>
    </div>
    <div class="sidebar-section">
        <div class="section-title">章节模式</div>
        <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="chapterModeToggle" checked> 自动添加「禁止快进」指令
        </label>
    </div>
    <div class="sidebar-section">
        <div class="section-title">导入/导出</div>
        <button id="exportCurrBtn">导出当前对话</button>
        <button id="importConvoBtn" style="margin-top: 6px;">导入对话(JSON)</button>
        <button id="backupAllBtn" style="margin-top: 6px;">备份全部对话</button>
        <button id="restoreAllBtn" style="margin-top: 6px;">恢复全部对话</button>
    </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="chat-container" id="chatContainer">
    <div class="message ai">
        <div class="bubble">给 DeepSeek 发送消息</div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea id="messageInput" rows="1" placeholder="输入章节剧情..."></textarea>
        <button id="fullscreenInputBtn" class="secondary" style="background: var(--bubble-ai);">全屏</button>
        <button id="sendBtn">发送</button>
    </div>
    <div class="stats" id="stats"></div>
</div>

<script>
    // ---------- 数据模型 ----------
    let conversations = [];       // [{ id, title, messages, storyPrompt, model, tags, createdAt, updatedAt }]
    let currentConvoId = null;
    let globalSystemPrompt = "";
    let apiKey = "";
    let isLoading = false;
    let abortController = null;

    // DOM
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const convoListDiv = document.getElementById('convoList');
    const chatTitleBtn = document.getElementById('chatTitleBtn');
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const globalPromptTextarea = document.getElementById('globalPrompt');
    const saveGlobalPromptBtn = document.getElementById('saveGlobalPromptBtn');
    const storyPromptTextarea = document.getElementById('storyPrompt');
    const modelSelect = document.getElementById('modelSelect');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const searchInput = document.getElementById('searchInput');
    const tagFilterInput = document.getElementById('tagFilterInput');
    const exportCurrBtn = document.getElementById('exportCurrBtn');
    const importConvoBtn = document.getElementById('importConvoBtn');
    const backupAllBtn = document.getElementById('backupAllBtn');
    const restoreAllBtn = document.getElementById('restoreAllBtn');
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    const scrollPrevUserBtn = document.getElementById('scrollPrevUserBtn');
    const fullscreenInputBtn = document.getElementById('fullscreenInputBtn');
    const chapterModeToggle = document.getElementById('chapterModeToggle');

    // 辅助函数
    function saveToLocal() {
        localStorage.setItem('bubble_conversations', JSON.stringify(conversations));
        localStorage.setItem('bubble_global_prompt', globalSystemPrompt);
        localStorage.setItem('bubble_api_key', apiKey);
        localStorage.setItem('bubble_current_id', currentConvoId);
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('bubble_conversations');
        if (saved) conversations = JSON.parse(saved);
        else conversations = [];
        globalSystemPrompt = localStorage.getItem('bubble_global_prompt') || "";
        globalPromptTextarea.value = globalSystemPrompt;
        apiKey = localStorage.getItem('bubble_api_key') || "";
        apiKeyInput.value = apiKey;
        const savedId = localStorage.getItem('bubble_current_id');
        if (savedId && conversations.find(c => c.id == savedId)) currentConvoId = savedId;
        else if (conversations.length) currentConvoId = conversations[0].id;
        else createNewConversation();
        if (conversations.length === 0) createNewConversation();
        renderConvoList();
        loadCurrentConvo();
    }

    function createNewConversation(title = "新对话") {
        const id = Date.now().toString();
        const newConvo = {
            id,
            title,
            messages: [{ role: 'assistant', content: '给 DeepSeek 发送消息', isPlaceholder: true }],
            storyPrompt: "",
            model: "deepseek-v4-flash",
            tags: "",
            createdAt: Date.now(),
            updatedAt: Date.now()
        };
        conversations.unshift(newConvo);
        currentConvoId = id;
        saveToLocal();
        renderConvoList();
        loadCurrentConvo();
    }

    function loadCurrentConvo() {
        const convo = conversations.find(c => c.id == currentConvoId);
        if (!convo) return;
        chatTitleBtn.innerText = convo.title;
        storyPromptTextarea.value = convo.storyPrompt || "";
        modelSelect.value = convo.model || "deepseek-v4-flash";
        renderMessages(convo.messages);
        updateStats();
    }

    function renderMessages(messages) {
        chatContainer.innerHTML = '';
        for (let i = 0; i < messages.length; i++) {
            const msg = messages[i];
            if (msg.isPlaceholder && msg.content === '给 DeepSeek 发送消息') {
                const div = document.createElement('div');
                div.className = 'message ai';
                div.innerHTML = `<div class="bubble" style="color: var(--text-secondary); font-style: italic;">${escapeHtml(msg.content)}</div>`;
                chatContainer.appendChild(div);
                continue;
            }
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
            let contentHtml = `<div class="bubble">${escapeHtml(msg.content)}</div>`;
            if (msg.collapsed) {
                contentHtml = `<div class="collapsed-msg" data-msg-index="${i}">[折叠消息] ${escapeHtml(msg.content.slice(0, 50))}...</div>`;
            }
            div.innerHTML = contentHtml;
            const actions = document.createElement('div');
            actions.className = 'message-actions';
            if (msg.role === 'user') {
                actions.innerHTML = `
                    <button class="msg-btn edit-msg" data-index="${i}">✎编辑</button>
                    <button class="msg-btn copy-msg" data-index="${i}">复制</button>
                    <button class="msg-btn delete-after" data-index="${i}">删除之后</button>
                    <button class="msg-btn branch-msg" data-index="${i}">分支</button>
                    <button class="msg-btn toggle-fold" data-index="${i}">${msg.collapsed ? '展开' : '折叠'}</button>
                    <button class="msg-btn fullscreen-msg" data-index="${i}">全屏</button>
                `;
            } else {
                actions.innerHTML = `
                    <button class="msg-btn regenerate" data-index="${i}">重新回答</button>
                    <button class="msg-btn copy-msg" data-index="${i}">复制</button>
                    <button class="msg-btn delete-after" data-index="${i}">删除之后</button>
                    <button class="msg-btn branch-msg" data-index="${i}">分支</button>
                `;
            }
            div.appendChild(actions);
            chatContainer.appendChild(div);
        }
        attachMessageActions();
        scrollToBottom();
    }

    function attachMessageActions() {
        document.querySelectorAll('.edit-msg').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                editMessage(idx);
            });
        });
        document.querySelectorAll('.copy-msg').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const idx = parseInt(btn.dataset.index);
                const convo = conversations.find(c => c.id == currentConvoId);
                const text = convo.messages[idx].content;
                await navigator.clipboard.writeText(text);
                showToast('已复制');
            });
        });
        document.querySelectorAll('.delete-after').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                if (confirm('删除此消息及之后所有消息？')) {
                    const convo = conversations.find(c => c.id == currentConvoId);
                    convo.messages = convo.messages.slice(0, idx);
                    if (convo.messages.length === 0) {
                        convo.messages = [{ role: 'assistant', content: '给 DeepSeek 发送消息', isPlaceholder: true }];
                    }
                    saveToLocal();
                    loadCurrentConvo();
                }
            });
        });
        document.querySelectorAll('.branch-msg').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                const convo = conversations.find(c => c.id == currentConvoId);
                const newMessages = convo.messages.slice(0, idx+1);
                const newId = Date.now().toString();
                const newConvo = {
                    id: newId,
                    title: convo.title + " (分支)",
                    messages: newMessages,
                    storyPrompt: convo.storyPrompt,
                    model: convo.model,
                    tags: convo.tags,
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                conversations.unshift(newConvo);
                currentConvoId = newId;
                saveToLocal();
                renderConvoList();
                loadCurrentConvo();
                showToast('已创建分支对话');
            });
        });
        document.querySelectorAll('.regenerate').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const idx = parseInt(btn.dataset.index);
                const convo = conversations.find(c => c.id == currentConvoId);
                // 删除从该AI消息之后的所有消息
                convo.messages = convo.messages.slice(0, idx);
                saveToLocal();
                loadCurrentConvo();
                // 重新发送上一条用户消息
                const lastUserMsg = convo.messages[convo.messages.length-1];
                if (lastUserMsg && lastUserMsg.role === 'user') {
                    await sendMessageInternal(lastUserMsg.content);
                }
            });
        });
        document.querySelectorAll('.toggle-fold').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                const convo = conversations.find(c => c.id == currentConvoId);
                convo.messages[idx].collapsed = !convo.messages[idx].collapsed;
                saveToLocal();
                loadCurrentConvo();
            });
        });
        document.querySelectorAll('.fullscreen-msg').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                const convo = conversations.find(c => c.id == currentConvoId);
                const content = convo.messages[idx].content;
                showFullscreenModal(content);
            });
        });
    }

    async function editMessage(idx) {
        const convo = conversations.find(c => c.id == currentConvoId);
        const oldContent = convo.messages[idx].content;
        const newContent = prompt("编辑消息:", oldContent);
        if (newContent && newContent !== oldContent) {
            convo.messages = convo.messages.slice(0, idx);
            convo.messages.push({ role: 'user', content: newContent });
            saveToLocal();
            loadCurrentConvo();
            await sendMessageInternal(newContent);
        }
    }

    async function sendMessageInternal(userText) {
        if (!apiKey) { alert('请设置API Key'); return; }
        if (isLoading) return;
        const convo = conversations.find(c => c.id == currentConvoId);
        // 移除占位消息
        if (convo.messages.length === 1 && convo.messages[0].isPlaceholder) {
            convo.messages = [];
        }
        let finalUserMsg = userText;
        if (chapterModeToggle.checked) {
            finalUserMsg = "⚠️ 请严格针对以下单章剧情进行扩写（约1000-1500字），切勿快进到后续发展，切勿自行收尾。仅描写这一章的内容，以对话或动作自然结束。\n\n" + userText;
        }
        convo.messages.push({ role: 'user', content: finalUserMsg });
        // 自动命名（首条用户消息）
        if (convo.messages.length === 1 && convo.title === "新对话") {
            let newTitle = userText.slice(0, 20);
            if (newTitle.length === 0) newTitle = "新对话";
            convo.title = newTitle;
            chatTitleBtn.innerText = newTitle;
        }
        saveToLocal();
        loadCurrentConvo();

        isLoading = true;
        sendBtn.disabled = true;
        sendBtn.innerText = "停止";
        const tempAiMsg = { role: 'assistant', content: '' };
        convo.messages.push(tempAiMsg);
        const msgIndex = convo.messages.length - 1;
        saveToLocal();
        loadCurrentConvo();

        const systemContent = (globalSystemPrompt.trim() ? globalSystemPrompt + "\n\n" : "") + (convo.storyPrompt || "");
        const requestMessages = [];
        if (systemContent.trim()) requestMessages.push({ role: 'system', content: systemContent });
        for (let m of convo.messages.slice(0, -1)) {
            if (m.role !== 'system') requestMessages.push({ role: m.role, content: m.content });
        }

        abortController = new AbortController();
        let fullContent = '';
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: convo.model,
                    messages: requestMessages,
                    stream: true,
                    temperature: 0.8,
                    max_tokens: 4096
                }),
                signal: abortController.signal
            });
            if (!response.ok) throw new Error(`API错误 ${response.status}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('data: ')) {
                        const data = trimmed.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullContent += delta;
                                convo.messages[msgIndex].content = fullContent;
                                saveToLocal();
                                const bubbles = document.querySelectorAll('.message.ai .bubble');
                                if (bubbles.length) bubbles[bubbles.length-1].innerText = fullContent;
                                scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            if (fullContent === '') convo.messages[msgIndex].content = '[无回复]';
            saveToLocal();
            loadCurrentConvo();
        } catch (err) {
            if (err.name !== 'AbortError') {
                convo.messages[msgIndex].content = `❌ 错误: ${err.message}`;
                saveToLocal();
                loadCurrentConvo();
            }
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            sendBtn.innerText = "发送";
            abortController = null;
        }
    }

    function updateStats() {
        const convo = conversations.find(c => c.id == currentConvoId);
        if (!convo) return;
        let totalChars = 0;
        for (let m of convo.messages) {
            if (!m.isPlaceholder) totalChars += m.content.length;
        }
        const estimatedTokens = Math.floor(totalChars * 0.6);
        const percent = (estimatedTokens / 1000000) * 100;
        const statsDiv = document.getElementById('stats');
        let warning = '';
        if (percent > 80) warning = ' ⚠️ 接近上下文上限';
        statsDiv.innerHTML = `字符: ${totalChars} | tokens: ~${estimatedTokens} | 已用: ${percent.toFixed(2)}%${warning}`;
        if (percent > 80) statsDiv.classList.add('warning');
        else statsDiv.classList.remove('warning');
    }

    function renderConvoList() {
        const searchTerm = searchInput.value.toLowerCase();
        const tagTerm = tagFilterInput.value.toLowerCase();
        let filtered = conversations.filter(c => {
            const matchSearch = c.title.toLowerCase().includes(searchTerm) || c.messages.some(m => m.content.toLowerCase().includes(searchTerm));
            const matchTag = !tagTerm || (c.tags && c.tags.toLowerCase().includes(tagTerm));
            return matchSearch && matchTag;
        });
        convoListDiv.innerHTML = '';
        for (let c of filtered) {
            const div = document.createElement('div');
            div.className = `convo-item ${c.id == currentConvoId ? 'active' : ''}`;
            div.innerHTML = `<span class="convo-title">${escapeHtml(c.title)}</span><button class="delete-convo" data-id="${c.id}">🗑️</button>`;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-convo')) return;
                currentConvoId = c.id;
                saveToLocal();
                loadCurrentConvo();
                renderConvoList();
                closeSidebar();
            });
            const delBtn = div.querySelector('.delete-convo');
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm('删除对话？')) {
                    conversations = conversations.filter(conv => conv.id != c.id);
                    if (currentConvoId == c.id) {
                        if (conversations.length) currentConvoId = conversations[0].id;
                        else createNewConversation();
                    }
                    saveToLocal();
                    renderConvoList();
                    loadCurrentConvo();
                }
            });
            // 右滑删除手势简化：长按也可删除，但已有点击删除按钮，不做复杂手势
            convoListDiv.appendChild(div);
        }
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 50);
    }

    function scrollToTop() {
        chatContainer.scrollTop = 0;
    }

    function scrollToPrevUserMsg() {
        const userMessages = Array.from(document.querySelectorAll('.message.user .bubble')).map(b => b.parentElement.parentElement);
        const container = chatContainer;
        const currentScroll = container.scrollTop;
        let prevUser = null;
        for (let i = userMessages.length-1; i >= 0; i--) {
            const top = userMessages[i].offsetTop;
            if (top < currentScroll - 50) {
                prevUser = userMessages[i];
                break;
            }
        }
        if (prevUser) prevUser.scrollIntoView({ behavior: 'smooth', block: 'start' });
        else showToast('已在最顶部');
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    function showFullscreenModal(content) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><textarea class="fullscreen-textarea" readonly>${escapeHtml(content)}</textarea><button style="margin-top:12px;">关闭</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('button').addEventListener('click', () => modal.remove());
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 事件绑定
    sendBtn.addEventListener('click', async () => {
        const text = messageInput.value.trim();
        if (!text) return;
        messageInput.value = '';
        await sendMessageInternal(text);
    });
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });
    chatTitleBtn.addEventListener('click', () => {
        const newTitle = prompt("修改对话标题", chatTitleBtn.innerText);
        if (newTitle) {
            const convo = conversations.find(c => c.id == currentConvoId);
            convo.title = newTitle;
            saveToLocal();
            chatTitleBtn.innerText = newTitle;
            renderConvoList();
        }
    });
    menuBtn.addEventListener('click', () => {
        sidebar.classList.add('open');
        overlay.classList.add('open');
    });
    overlay.addEventListener('click', closeSidebar);
    function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
    }
    saveGlobalPromptBtn.addEventListener('click', () => {
        globalSystemPrompt = globalPromptTextarea.value;
        saveToLocal();
        showToast("全局风格已保存");
    });
    saveApiKeyBtn.addEventListener('click', () => {
        apiKey = apiKeyInput.value.trim();
        saveToLocal();
        showToast("API Key已保存");
    });
    newChatBtn.addEventListener('click', () => {
        createNewConversation();
        closeSidebar();
    });
    exportCurrBtn.addEventListener('click', () => {
        const convo = conversations.find(c => c.id == currentConvoId);
        const exportData = {
            title: convo.title,
            messages: convo.messages.filter(m => !m.isPlaceholder),
            storyPrompt: convo.storyPrompt,
            model: convo.model
        };
        const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${convo.title}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });
    importConvoBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            const text = await file.text();
            const data = JSON.parse(text);
            const newConvo = {
                id: Date.now().toString(),
                title: data.title + " (导入)",
                messages: data.messages,
                storyPrompt: data.storyPrompt || "",
                model: data.model || "deepseek-v4-flash",
                tags: "",
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
            conversations.unshift(newConvo);
            saveToLocal();
            renderConvoList();
            showToast("已导入");
        };
        input.click();
    });
    backupAllBtn.addEventListener('click', () => {
        const backup = { conversations, globalSystemPrompt, apiKey };
        const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'backup.json';
        a.click();
        URL.revokeObjectURL(url);
    });
    restoreAllBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            const text = await file.text();
            const backup = JSON.parse(text);
            conversations = backup.conversations || [];
            globalSystemPrompt = backup.globalSystemPrompt || "";
            apiKey = backup.apiKey || "";
            if (conversations.length) currentConvoId = conversations[0].id;
            else createNewConversation();
            saveToLocal();
            globalPromptTextarea.value = globalSystemPrompt;
            apiKeyInput.value = apiKey;
            renderConvoList();
            loadCurrentConvo();
            showToast("已恢复");
        };
        input.click();
    });
    scrollTopBtn.addEventListener('click', scrollToTop);
    scrollPrevUserBtn.addEventListener('click', scrollToPrevUserMsg);
    fullscreenInputBtn.addEventListener('click', () => {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><textarea id="fullscreenText" class="fullscreen-textarea">${escapeHtml(messageInput.value)}</textarea><button id="fullscreenSave">保存</button><button id="fullscreenCancel">取消</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#fullscreenSave').addEventListener('click', () => {
            messageInput.value = modal.querySelector('#fullscreenText').value;
            modal.remove();
        });
        modal.querySelector('#fullscreenCancel').addEventListener('click', () => modal.remove());
    });

    storyPromptTextarea.addEventListener('change', () => {
        const convo = conversations.find(c => c.id == currentConvoId);
        convo.storyPrompt = storyPromptTextarea.value;
        saveToLocal();
    });
    modelSelect.addEventListener('change', () => {
        const convo = conversations.find(c => c.id == currentConvoId);
        convo.model = modelSelect.value;
        saveToLocal();
    });
    searchInput.addEventListener('input', renderConvoList);
    tagFilterInput.addEventListener('input', renderConvoList);

    // 自动保存输入框草稿
    let draftTimeout;
    messageInput.addEventListener('input', () => {
        clearTimeout(draftTimeout);
        draftTimeout = setTimeout(() => {
            localStorage.setItem('draft_' + currentConvoId, messageInput.value);
        }, 500);
    });
    function loadDraft() {
        const draft = localStorage.getItem('draft_' + currentConvoId);
        if (draft) messageInput.value = draft;
    }
    // 初始化
    loadFromLocal();
    loadDraft();
    setInterval(updateStats, 1000);
</script>
</body>

    <style>
        * {
            box-sizing: border-box;

        :root {
            --bg: #ffffff;

                --text: #ededee;
                --text-secondary: #8e8e93;

                --bubble-ai: #2c2c2e;

        /* 底部输入栏 */

            flex-shrink: 0;

            flex: 1;

        button {

        }
        button:active { opacity: 0.7; }

        /* 设置面板 (折叠) */

            display: flex;

            font-size: 0.8rem;
        }

            border-color: #10a37f;
            color: white;

        .small-btn {

        }
        .danger-btn {
            background: #dc2626;
        }
        hr {
            border-color: var(--border);
            margin: 4px 0;
        }
    </style>
</head>
<body>

<div class="header">
    <span class="title">📖 同人创作助手 · DeepSeek</span>
    <button class="settings-btn" id="toggleSettingsBtn">⚙️</button>
</div>

<div id="settingsPanel" class="settings-panel">
    <div class="setting-row">
        <label>🔑 API Key (deepseek官方)</label>
        <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
        <button id="saveKeyBtn" style="background:#3b82f6; margin-top:5px;">保存密钥</button>
    </div>
    <div class="setting-row">
        <label>📝 系统提示词 (System Prompt) — 留空则不发送</label>
        <textarea id="systemPromptInput" rows="2" placeholder="例如：你是一位擅长写ABO设定的同人作者..."></textarea>
    </div>
    <div class="setting-row">
        <label>🤖 模型选择</label>
        <div class="model-buttons">
            <button class="model-btn" data-model="deepseek-v4-flash">⚡ Flash (快速/便宜)</button>
            <button class="model-btn" data-model="deepseek-v4-pro">🏆 Pro (强大/长文)</button>
        </div>
    </div>
    <div class="setting-row">
        <button id="clearChatBtn" class="small-btn danger-btn">🗑️ 清空对话记录</button>
    </div>
    <div class="setting-row">
        <small style="color: var(--text-secondary);">✅ 对话自动保存 · 流式输出 · 明暗跟随系统</small>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message ai">
        <div class="bubble">你好！我是你的同人文助手。请先在上方设置你的 API Key，然后开始创作吧 ✍️</div>
    </div>
</div>

<div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="写一段场景... 或描述你想让AI续写的内容"></textarea>
    <button id="sendBtn">发送</button>
</div>

<script>
    // ---------- DOM 元素 ----------
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const systemPromptInput = document.getElementById('systemPromptInput');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const modelBtns = document.querySelectorAll('.model-btn');

    // ---------- 全局变量 ----------
    let currentModel = 'deepseek-v4-flash';
    let currentApiKey = '';
    let currentSystemPrompt = '';
    let messages = [];
    let isLoading = false;
    let abortController = null;

    // ---------- 本地存储读取 ----------
    function loadStorage() {
        const savedApiKey = localStorage.getItem('ds_api_key');
        if (savedApiKey) {
            currentApiKey = savedApiKey;
            apiKeyInput.value = savedApiKey;
        }
        const savedSysPrompt = localStorage.getItem('ds_system_prompt');
        if (savedSysPrompt) {
            currentSystemPrompt = savedSysPrompt;
            systemPromptInput.value = savedSysPrompt;
        } else {
            // 用户要求：不预加载任何默认提示词，保持空白
            currentSystemPrompt = '';
            systemPromptInput.value = '';
        }
        const savedModel = localStorage.getItem('ds_model');
        if (savedModel && (savedModel === 'deepseek-v4-flash' || savedModel === 'deepseek-v4-pro')) {
            currentModel = savedModel;
        } else {
            currentModel = 'deepseek-v4-flash';
        }
        updateModelButtonUI();
        
        const savedMessages = localStorage.getItem('ds_messages');
        if (savedMessages) {
            try {
                messages = JSON.parse(savedMessages);
                if (!Array.isArray(messages)) messages = [];
            } catch(e) { messages = []; }
        }
        if (messages.length === 0) {
            messages = [
                { role: 'user', content: '你好，请自我介绍' },
                { role: 'assistant', content: '你好！我是你的同人文助手。请先在上方设置你的 API Key，然后开始创作吧 ✍️' }
            ];
        }
        renderMessages();
    }

    function saveApiKeyToStorage(key) {
        localStorage.setItem('ds_api_key', key);
        currentApiKey = key;
    }
    function saveSystemPromptToStorage(prompt) {
        localStorage.setItem('ds_system_prompt', prompt);
        currentSystemPrompt = prompt;
    }
    function saveModelToStorage(model) {
        localStorage.setItem('ds_model', model);
        currentModel = model;
    }
    function saveMessagesToStorage() {
        localStorage.setItem('ds_messages', JSON.stringify(messages));
    }

    function updateModelButtonUI() {
        modelBtns.forEach(btn => {
            const modelVal = btn.getAttribute('data-model');
            if (modelVal === currentModel) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    function renderMessages() {
        chatContainer.innerHTML = '';
        for (let msg of messages) {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = msg.content;
            div.appendChild(bubble);
            chatContainer.appendChild(div);
        }
        scrollToBottom();
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 50);
    }

    function addMessage(role, content, save = true) {
        messages.push({ role, content });
        if (save) saveMessagesToStorage();
        renderMessages();
    }

    async function sendWithStream(userMessage) {
        if (!currentApiKey) {
            alert('请先设置并保存 API Key');
            return;
        }
        if (isLoading) return;
        isLoading = true;
        sendBtn.disabled = true;
        
        addMessage('user', userMessage, true);
        messageInput.value = '';
        messageInput.style.height = 'auto';
        
        const tempAiMsg = { role: 'assistant', content: '' };
        messages.push(tempAiMsg);
        const msgIndex = messages.length - 1;
        renderMessages();
        const lastBubble = chatContainer.lastChild?.querySelector('.bubble');
        
        const requestMessages = [];
        if (currentSystemPrompt && currentSystemPrompt.trim()) {
            requestMessages.push({ role: 'system', content: currentSystemPrompt });
        }
        const historyMessages = messages.slice(0, -1);
        for (let m of historyMessages) {
            requestMessages.push({ role: m.role, content: m.content });
        }
        
        const apiUrl = 'https://api.deepseek.com/v1/chat/completions';
        abortController = new AbortController();
        
        let fullContent = '';
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: currentModel,
                    messages: requestMessages,
                    stream: true,
                    temperature: 0.8,
                    max_tokens: 4096
                }),
                signal: abortController.signal
            });
            
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API错误 ${response.status}: ${errText}`);
            }
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('data: ')) {
                        const data = trimmed.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullContent += delta;
                                messages[msgIndex].content = fullContent;
                                if (lastBubble) lastBubble.innerText = fullContent;
                                scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            if (fullContent === '') {
                messages[msgIndex].content = '[无回复内容]';
                if (lastBubble) lastBubble.innerText = '[无回复内容]';
            }
            saveMessagesToStorage();
        } catch (error) {
            if (error.name === 'AbortError') {
                console.log('请求取消');
            } else {
                console.error(error);
                messages[msgIndex].content = `❌ 错误: ${error.message}`;
                if (lastBubble) lastBubble.innerText = `❌ 错误: ${error.message}`;
                saveMessagesToStorage();
            }
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            abortController = null;
        }
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        if (!currentApiKey) {
            alert('请先点击⚙️，粘贴你的DeepSeek API Key并点击保存');
            return;
        }
        sendWithStream(text);
    }
    
    function clearChat() {
        if (isLoading) {
            if (abortController) abortController.abort();
        }
        messages = [
            { role: 'assistant', content: '对话已清空。我们来写一段新同人吧 ✨' }
        ];
        saveMessagesToStorage();
        renderMessages();
    }
    
    function saveApiKey() {
        const newKey = apiKeyInput.value.trim();
        if (newKey) {
            saveApiKeyToStorage(newKey);
            alert('API Key 已保存（仅存在本机）');
        } else {
            alert('请输入有效的 Key');
        }
    }
    
    function bindSystemPromptSave() {
        systemPromptInput.addEventListener('change', () => {
            saveSystemPromptToStorage(systemPromptInput.value);
        });
    }
    
    function initModelSwitch() {
        modelBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const model = btn.getAttribute('data-model');
                currentModel = model;
                saveModelToStorage(model);
                updateModelButtonUI();
            });
        });
    }
    
    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(120, messageInput.scrollHeight) + 'px';
    }
    
    function handleKeyboard() {
        messageInput.addEventListener('focus', () => {
            setTimeout(() => scrollToBottom(), 300);
        });
    }
    
    function bindEvents() {
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        messageInput.addEventListener('input', autoResizeTextarea);
        saveKeyBtn.addEventListener('click', saveApiKey);
        clearChatBtn.addEventListener('click', clearChat);
        toggleSettingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('show');
        });
        bindSystemPromptSave();
        initModelSwitch();
        handleKeyboard();
    }
    
    loadStorage();
    bindEvents();
    if (!currentApiKey) {
        setTimeout(() => {
            settingsPanel.classList.add('show');
        }, 300);
    }
</script>
</body>
</html>
