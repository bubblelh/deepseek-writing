<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8f4ec" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1e1e2a" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23d9a56c'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-weight='bold'%3Eds%3C/text%3E%3C/svg%3E">
    <title>bubble.lh · Think</title>
    <!-- Font Awesome 6 (free, 简洁线条图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f8f4ec;
            --surface: #ffffff;
            --border: #e9e6df;
            --text: #1c1c1e;
            --text-secondary: #8e8e93;
            --bubble-user: #007aff;
            --bubble-user-text: white;
            --bubble-ai: #e5e5ea;
            --bubble-ai-text: #1c1c1e;
            --input-bg: #ffffff;
            --accent: #007aff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1e;
                --surface: #2c2c2e;
                --border: #3a3a3c;
                --text: #ffffff;
                --text-secondary: #8e8e93;
                --bubble-user: #007aff;
                --bubble-user-text: white;
                --bubble-ai: #3a3a3c;
                --bubble-ai-text: #ffffff;
                --input-bg: #2c2c2e;
                --accent: #0a84ff;
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* 顶部栏 */
        .header {
            background: rgba(var(--bg), 0.8);
            backdrop-filter: blur(20px);
            padding: env(safe-area-inset-top) 16px 8px 16px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            min-height: 44px;
        }
        .menu-btn, .more-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: var(--accent);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .chat-title {
            font-weight: 600;
            font-size: 17px;
            background: var(--surface);
            border: none;
            color: var(--text);
            padding: 6px 12px;
            border-radius: 30px;
            max-width: 50%;
            white-space: nowrap;
            overflow-x: auto;
            cursor: pointer;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            background: var(--surface);
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 13px;
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: -80%;
            width: 80%;
            height: 100%;
            background: var(--surface);
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 2px 0 12px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: env(safe-area-inset-top) 16px 20px 16px;
            gap: 20px;
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            display: none;
        }
        .sidebar-overlay.open { display: block; }
        .sidebar-section {
            border-bottom: 0.5px solid var(--border);
            padding-bottom: 16px;
        }
        .section-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 16px;
        }
        textarea, input, select {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 0.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
        }
        button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
        }
        .convo-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .convo-item.active { background: var(--accent); color: white; }
        .convo-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 15px; }
        .delete-convo { background: none; color: var(--text-secondary); font-size: 18px; padding: 4px 8px; }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            display: flex;
            max-width: 85%;
        }
        .message.user { align-self: flex-end; justify-content: flex-end; }
        .message.ai { align-self: flex-start; }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
            font-size: 15px;
        }
        .user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 4px;
        }
        .ai .bubble {
            background: var(--bubble-ai);
            color: var(--bubble-ai-text);
            border-bottom-left-radius: 4px;
        }
        .collapsed-msg {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* 输入区域 */
        .input-area {
            background: var(--surface);
            border-top: 0.5px solid var(--border);
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-row textarea {
            flex: 1;
            max-height: 120px;
            resize: none;
        }
        .model-bar {
            display: flex;
            justify-content: flex-end;
        }
        .model-switch {
            background: var(--bg);
            border: 0.5px solid var(--border);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 13px;
            color: var(--accent);
            cursor: pointer;
        }
        .stats {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
        }
        .warning { color: #ff3b30; }

        /* 模态框 / 菜单 */
        .modal, .action-sheet {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--surface);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 20px;
            max-height: 80%;
            overflow-y: auto;
        }
        .action-sheet-menu {
            background: var(--surface);
            border-radius: 14px;
            width: 90%;
            max-width: 350px;
            overflow: hidden;
        }
        .action-sheet-item {
            padding: 14px 20px;
            font-size: 17px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .action-sheet-item:last-child { border-bottom: none; }
        .action-sheet-cancel {
            margin-top: 8px;
            background: var(--surface);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 3000;
        }
        i { font-style: normal; margin-right: 8px; width: 24px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    <button class="chat-title" id="chatTitleBtn">新对话</button>
    <div class="nav-buttons">
        <button class="nav-btn" id="scrollTopBtn">顶端</button>
        <button class="nav-btn" id="scrollPrevUserBtn">上一条</button>
        <button class="more-btn" id="moreBtn"><i class="fas fa-ellipsis-h"></i></button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-section">
        <div class="section-title">对话</div>
        <button id="newChatBtn" style="margin-bottom: 12px;"><i class="fas fa-plus"></i> 新建对话</button>
        <input type="text" id="searchInput" placeholder="搜索对话" style="margin-bottom: 12px;">
        <input type="text" id="tagFilterInput" placeholder="标签筛选" style="margin-bottom: 8px;">
        <div id="convoList"></div>
    </div>
    <div class="sidebar-section">
        <div class="section-title">全局写作风格</div>
        <textarea id="globalPrompt" rows="3" placeholder="文风、禁令等（所有对话共用）"></textarea>
        <button id="saveGlobalPromptBtn" style="margin-top: 6px;">保存</button>
    </div>
    <div class="sidebar-section">
        <div class="section-title">本故事设定</div>
        <textarea id="storyPrompt" rows="3" placeholder="角色、世界观等（仅当前对话）"></textarea>
    </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="chat-container" id="chatContainer">
    <div class="message ai"><div class="bubble">给 DeepSeek 发送消息</div></div>
</div>

<div class="input-area">
    <div class="input-row">
        <textarea id="messageInput" rows="1" placeholder="输入章节剧情..."></textarea>
        <button id="sendBtn">发送</button>
    </div>
    <div class="model-bar">
        <span class="model-switch" id="modelSwitchBtn">⚡ Flash</span>
    </div>
    <div class="stats" id="stats"></div>
</div>

<script>
    // ---------- 数据 ----------
    let conversations = [];
    let currentConvoId = null;
    let globalSystemPrompt = "";
    let apiKey = "";
    let isLoading = false;
    let abortController = null;
    let currentModel = "deepseek-v4-flash";   // 与对话独立，但为了方便，每个对话有自己的model，切换时更新
    let temperature = 0.8;
    let topP = 0.9;

    // DOM
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const convoListDiv = document.getElementById('convoList');
    const chatTitleBtn = document.getElementById('chatTitleBtn');
    const menuBtn = document.getElementById('menuBtn');
    const moreBtn = document.getElementById('moreBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const globalPromptTextarea = document.getElementById('globalPrompt');
    const saveGlobalPromptBtn = document.getElementById('saveGlobalPromptBtn');
    const storyPromptTextarea = document.getElementById('storyPrompt');
    const newChatBtn = document.getElementById('newChatBtn');
    const searchInput = document.getElementById('searchInput');
    const tagFilterInput = document.getElementById('tagFilterInput');
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    const scrollPrevUserBtn = document.getElementById('scrollPrevUserBtn');
    const modelSwitchBtn = document.getElementById('modelSwitchBtn');

    // 辅助函数
    function saveToLocal() {
        localStorage.setItem('bubble_conversations', JSON.stringify(conversations));
        localStorage.setItem('bubble_global_prompt', globalSystemPrompt);
        localStorage.setItem('bubble_api_key', apiKey);
        localStorage.setItem('bubble_current_id', currentConvoId);
        localStorage.setItem('bubble_temperature', temperature);
        localStorage.setItem('bubble_topP', topP);
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('bubble_conversations');
        if (saved) conversations = JSON.parse(saved);
        else conversations = [];
        globalSystemPrompt = localStorage.getItem('bubble_global_prompt') || "";
        globalPromptTextarea.value = globalSystemPrompt;
        apiKey = localStorage.getItem('bubble_api_key') || "";
        const savedId = localStorage.getItem('bubble_current_id');
        if (savedId && conversations.find(c => c.id == savedId)) currentConvoId = savedId;
        else if (conversations.length) currentConvoId = conversations[0].id;
        else createNewConversation();
        if (conversations.length === 0) createNewConversation();
        temperature = parseFloat(localStorage.getItem('bubble_temperature')) || 0.8;
        topP = parseFloat(localStorage.getItem('bubble_topP')) || 0.9;
        renderConvoList();
        loadCurrentConvo();
    }

    function createNewConversation(title = "新对话") {
        const id = Date.now().toString();
        const newConvo = {
            id, title,
            messages: [{ role: 'assistant', content: '给 DeepSeek 发送消息', isPlaceholder: true }],
            storyPrompt: "",
            model: "deepseek-v4-flash",
            tags: "",
            createdAt: Date.now(), updatedAt: Date.now()
        };
        conversations.unshift(newConvo);
        currentConvoId = id;
        saveToLocal();
        renderConvoList();
        loadCurrentConvo();
    }

    function loadCurrentConvo() {
        const convo = conversations.find(c => c.id == currentConvoId);
        if (!convo) return;
        chatTitleBtn.innerText = convo.title;
        storyPromptTextarea.value = convo.storyPrompt || "";
        currentModel = convo.model || "deepseek-v4-flash";
        updateModelButton();
        renderMessages(convo.messages);
        updateStats();
    }

    function updateModelButton() {
        modelSwitchBtn.innerText = currentModel === 'deepseek-v4-flash' ? '⚡ Flash' : '🏆 Pro';
    }

    function renderMessages(messages) {
        chatContainer.innerHTML = '';
        for (let i = 0; i < messages.length; i++) {
            const msg = messages[i];
            if (msg.isPlaceholder && msg.content === '给 DeepSeek 发送消息') {
                const div = document.createElement('div');
                div.className = 'message ai';
                div.innerHTML = `<div class="bubble" style="color: var(--text-secondary); font-style: italic;">${escapeHtml(msg.content)}</div>`;
                chatContainer.appendChild(div);
                continue;
            }
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
            let contentHtml = `<div class="bubble">${escapeHtml(msg.content)}</div>`;
            if (msg.collapsed) {
                contentHtml = `<div class="collapsed-msg" data-msg-index="${i}">[折叠] ${escapeHtml(msg.content.slice(0, 50))}...</div>`;
            }
            div.innerHTML = contentHtml;
            div.dataset.index = i;
            div.dataset.role = msg.role;
            div.addEventListener('contextmenu', (e) => { e.preventDefault(); showMessageMenu(i, msg.role); });
            div.addEventListener('touchstart', (e) => { if (e.touches.length === 1) { longPressTimer = setTimeout(() => { showMessageMenu(i, msg.role); }, 500); } });
            div.addEventListener('touchend', () => clearTimeout(longPressTimer));
            div.addEventListener('touchmove', () => clearTimeout(longPressTimer));
            chatContainer.appendChild(div);
        }
        scrollToBottom();
    }
    let longPressTimer;

    function showMessageMenu(index, role) {
        const convo = conversations.find(c => c.id == currentConvoId);
        const msg = convo.messages[index];
        let items = [];
        if (role === 'user') {
            items = [
                { icon: 'fas fa-pen', label: '编辑', action: () => editMessage(index) },
                { icon: 'fas fa-copy', label: '复制', action: () => copyMessage(index) },
                { icon: 'fas fa-compress-alt', label: '折叠/展开', action: () => toggleFold(index) },
                { icon: 'fas fa-expand', label: '全屏查看', action: () => fullscreenMessage(index) },
                { icon: 'fas fa-ellipsis-h', label: '更多', action: () => showMoreMenu(index, role) }
            ];
        } else {
            items = [
                { icon: 'fas fa-redo-alt', label: '重新回答', action: () => regenerate(index) },
                { icon: 'fas fa-copy', label: '复制', action: () => copyMessage(index) },
                { icon: 'fas fa-ellipsis-h', label: '更多', action: () => showMoreMenu(index, role) }
            ];
        }
        showActionSheet(items);
    }

    function showMoreMenu(index, role) {
        let items = [
            { icon: 'fas fa-trash-alt', label: '删除之后', action: () => deleteAfter(index) },
            { icon: 'fas fa-code-branch', label: '分支', action: () => branchFrom(index) }
        ];
        showActionSheet(items);
    }

    function showActionSheet(items) {
        const sheet = document.createElement('div');
        sheet.className = 'action-sheet';
        let html = `<div class="action-sheet-menu">`;
        items.forEach(item => {
            html += `<div class="action-sheet-item"><i class="${item.icon}"></i>${item.label}</div>`;
        });
        html += `</div><div class="action-sheet-cancel">取消</div>`;
        sheet.innerHTML = html;
        document.body.appendChild(sheet);
        const itemDivs = sheet.querySelectorAll('.action-sheet-item');
        itemDivs.forEach((div, idx) => {
            div.addEventListener('click', () => {
                items[idx].action();
                sheet.remove();
            });
        });
        sheet.querySelector('.action-sheet-cancel').addEventListener('click', () => sheet.remove());
    }

    function editMessage(idx) {
        const convo = conversations.find(c => c.id == currentConvoId);
        const oldContent = convo.messages[idx].content;
        const newContent = prompt("编辑消息", oldContent);
        if (newContent && newContent !== oldContent) {
            convo.messages = convo.messages.slice(0, idx);
            convo.messages.push({ role: 'user', content: newContent });
            saveToLocal();
            loadCurrentConvo();
            sendMessageInternal(newContent);
        }
    }

    async function copyMessage(idx) {
        const convo = conversations.find(c => c.id == currentConvoId);
        await navigator.clipboard.writeText(convo.messages[idx].content);
        showToast('已复制');
    }

    function toggleFold(idx) {
        const convo = conversations.find(c => c.id == currentConvoId);
        convo.messages[idx].collapsed = !convo.messages[idx].collapsed;
        saveToLocal();
        loadCurrentConvo();
    }

    function fullscreenMessage(idx) {
        const convo = conversations.find(c => c.id == currentConvoId);
        showFullscreenModal(convo.messages[idx].content);
    }

    function deleteAfter(idx) {
        if (confirm('删除此消息及之后所有消息？')) {
            const convo = conversations.find(c => c.id == currentConvoId);
            convo.messages = convo.messages.slice(0, idx);
            if (convo.messages.length === 0) convo.messages = [{ role: 'assistant', content: '给 DeepSeek 发送消息', isPlaceholder: true }];
            saveToLocal();
            loadCurrentConvo();
        }
    }

    function branchFrom(idx) {
        const convo = conversations.find(c => c.id == currentConvoId);
        const newMessages = convo.messages.slice(0, idx+1);
        const newId = Date.now().toString();
        const newConvo = {
            id: newId, title: convo.title + " (分支)", messages: newMessages,
            storyPrompt: convo.storyPrompt, model: convo.model, tags: convo.tags,
            createdAt: Date.now(), updatedAt: Date.now()
        };
        conversations.unshift(newConvo);
        currentConvoId = newId;
        saveToLocal();
        renderConvoList();
        loadCurrentConvo();
        showToast('已创建分支对话');
    }

    async function regenerate(idx) {
        const convo = conversations.find(c => c.id == currentConvoId);
        convo.messages = convo.messages.slice(0, idx);
        saveToLocal();
        loadCurrentConvo();
        const lastUserMsg = convo.messages[convo.messages.length-1];
        if (lastUserMsg && lastUserMsg.role === 'user') {
            await sendMessageInternal(lastUserMsg.content);
        }
    }

    async function sendMessageInternal(userText) {
        if (!apiKey) { alert('请先在二级菜单设置 API Key'); return; }
        if (isLoading) return;
        const convo = conversations.find(c => c.id == currentConvoId);
        if (convo.messages.length === 1 && convo.messages[0].isPlaceholder) convo.messages = [];
        let finalUserMsg = userText;
        const chapterMode = localStorage.getItem('chapter_mode') !== 'false';
        if (chapterMode) {
            finalUserMsg = "⚠️ 请严格针对以下单章剧情进行扩写（约1000-1500字），切勿快进到后续发展，切勿自行收尾。仅描写这一章的内容，以对话或动作自然结束。\n\n" + userText;
        }
        convo.messages.push({ role: 'user', content: finalUserMsg });
        if (convo.messages.length === 1 && convo.title === "新对话") {
            let newTitle = userText.slice(0, 20);
            if (!newTitle) newTitle = "新对话";
            convo.title = newTitle;
            chatTitleBtn.innerText = newTitle;
        }
        saveToLocal();
        loadCurrentConvo();

        isLoading = true;
        sendBtn.disabled = true;
        sendBtn.innerText = "停止";
        const tempAiMsg = { role: 'assistant', content: '' };
        convo.messages.push(tempAiMsg);
        const msgIndex = convo.messages.length - 1;
        saveToLocal();
        loadCurrentConvo();

        const systemContent = (globalSystemPrompt.trim() ? globalSystemPrompt + "\n\n" : "") + (convo.storyPrompt || "");
        const requestMessages = [];
        if (systemContent.trim()) requestMessages.push({ role: 'system', content: systemContent });
        for (let m of convo.messages.slice(0, -1)) {
            if (m.role !== 'system') requestMessages.push({ role: m.role, content: m.content });
        }

        abortController = new AbortController();
        let fullContent = '';
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: convo.model, messages: requestMessages, stream: true,
                    temperature: temperature, top_p: topP, max_tokens: 4096
                }), signal: abortController.signal
            });
            if (!response.ok) throw new Error(`API错误 ${response.status}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('data: ')) {
                        const data = trimmed.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullContent += delta;
                                convo.messages[msgIndex].content = fullContent;
                                saveToLocal();
                                const bubbles = document.querySelectorAll('.message.ai .bubble');
                                if (bubbles.length) bubbles[bubbles.length-1].innerText = fullContent;
                                scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            if (!fullContent) convo.messages[msgIndex].content = '[无回复]';
            saveToLocal();
            loadCurrentConvo();
        } catch (err) {
            if (err.name !== 'AbortError') {
                convo.messages[msgIndex].content = `错误: ${err.message}`;
                saveToLocal();
                loadCurrentConvo();
            }
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            sendBtn.innerText = "发送";
            abortController = null;
        }
    }

    function updateStats() {
        const convo = conversations.find(c => c.id == currentConvoId);
        if (!convo) return;
        let totalChars = 0;
        for (let m of convo.messages) if (!m.isPlaceholder) totalChars += m.content.length;
        const estimatedTokens = Math.floor(totalChars * 0.6);
        const percent = (estimatedTokens / 1000000) * 100;
        const statsDiv = document.getElementById('stats');
        let warning = percent > 80 ? ' ⚠️ 接近上限' : '';
        statsDiv.innerHTML = `字符: ${totalChars} | tokens: ~${estimatedTokens} | 已用: ${percent.toFixed(2)}%${warning}`;
        if (percent > 80) statsDiv.classList.add('warning');
        else statsDiv.classList.remove('warning');
    }

    function renderConvoList() {
        const searchTerm = searchInput.value.toLowerCase();
        const tagTerm = tagFilterInput.value.toLowerCase();
        let filtered = conversations.filter(c => {
            const matchSearch = c.title.toLowerCase().includes(searchTerm) || c.messages.some(m => m.content.toLowerCase().includes(searchTerm));
            const matchTag = !tagTerm || (c.tags && c.tags.toLowerCase().includes(tagTerm));
            return matchSearch && matchTag;
        });
        convoListDiv.innerHTML = '';
        for (let c of filtered) {
            const div = document.createElement('div');
            div.className = `convo-item ${c.id == currentConvoId ? 'active' : ''}`;
            div.innerHTML = `<span class="convo-title">${escapeHtml(c.title)}</span><button class="delete-convo" data-id="${c.id}"><i class="fas fa-trash-alt"></i></button>`;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-convo') || e.target.parentElement.classList.contains('delete-convo')) return;
                currentConvoId = c.id;
                saveToLocal();
                loadCurrentConvo();
                renderConvoList();
                closeSidebar();
            });
            const delBtn = div.querySelector('.delete-convo');
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm('删除对话？')) {
                    conversations = conversations.filter(conv => conv.id != c.id);
                    if (currentConvoId == c.id) {
                        if (conversations.length) currentConvoId = conversations[0].id;
                        else createNewConversation();
                    }
                    saveToLocal();
                    renderConvoList();
                    loadCurrentConvo();
                }
            });
            convoListDiv.appendChild(div);
        }
    }

    function scrollToTop() { chatContainer.scrollTop = 0; }
    function scrollToPrevUserMsg() {
        const userMsgDivs = Array.from(document.querySelectorAll('.message.user'));
        const container = chatContainer;
        const currentScroll = container.scrollTop;
        let prev = null;
        for (let i = userMsgDivs.length-1; i >= 0; i--) {
            const top = userMsgDivs[i].offsetTop;
            if (top < currentScroll - 50) { prev = userMsgDivs[i]; break; }
        }
        if (prev) prev.scrollIntoView({ behavior: 'smooth', block: 'start' });
        else showToast('已在最顶部');
    }

    function showToast(msg) {
        const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }
    function showFullscreenModal(content) {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><textarea class="fullscreen-textarea" style="width:100%;height:200px;" readonly>${escapeHtml(content)}</textarea><button style="margin-top:12px;">关闭</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('button').addEventListener('click', () => modal.remove());
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

    // 二级菜单（更多）
    moreBtn.addEventListener('click', () => {
        let items = [
            { icon: 'fas fa-key', label: 'API Key', action: () => { let key = prompt("请输入 API Key", apiKey); if(key) { apiKey = key; saveToLocal(); showToast("已保存"); } } },
            { icon: 'fas fa-download', label: '导出当前对话', action: () => { const convo = conversations.find(c => c.id == currentConvoId); const data = { title: convo.title, messages: convo.messages.filter(m=>!m.isPlaceholder), storyPrompt: convo.storyPrompt, model: convo.model }; const blob = new Blob([JSON.stringify(data)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${convo.title}.json`; a.click(); URL.revokeObjectURL(blob); } },
            { icon: 'fas fa-upload', label: '导入对话', action: () => { const input = document.createElement('input'); input.type='file'; input.accept='application/json'; input.onchange = async e => { const file = e.target.files[0]; const text = await file.text(); const data = JSON.parse(text); const newConvo = { id: Date.now().toString(), title: data.title + " (导入)", messages: data.messages, storyPrompt: data.storyPrompt || "", model: data.model || "deepseek-v4-flash", tags: "", createdAt: Date.now(), updatedAt: Date.now() }; conversations.unshift(newConvo); saveToLocal(); renderConvoList(); showToast("已导入"); }; input.click(); } },
            { icon: 'fas fa-archive', label: '备份全部对话', action: () => { const backup = { conversations, globalSystemPrompt, apiKey }; const blob = new Blob([JSON.stringify(backup)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click(); URL.revokeObjectURL(blob); } },
            { icon: 'fas fa-history', label: '恢复全部对话', action: () => { const input = document.createElement('input'); input.type='file'; input.accept='application/json'; input.onchange = async e => { const file = e.target.files[0]; const text = await file.text(); const backup = JSON.parse(text); conversations = backup.conversations || []; globalSystemPrompt = backup.globalSystemPrompt || ""; apiKey = backup.apiKey || ""; if(conversations.length) currentConvoId = conversations[0].id; else createNewConversation(); saveToLocal(); globalPromptTextarea.value = globalSystemPrompt; renderConvoList(); loadCurrentConvo(); showToast("已恢复"); }; input.click(); } },
            { icon: 'fas fa-toggle-on', label: '章节模式', action: () => { let enabled = localStorage.getItem('chapter_mode') !== 'false'; enabled = !enabled; localStorage.setItem('chapter_mode', enabled); showToast(`章节模式已${enabled?'开启':'关闭'}`); } },
            { icon: 'fas fa-thermometer-half', label: `温度: ${temperature}`, action: () => { let val = prompt("温度 (0-2)", temperature); if(val && !isNaN(val)) { temperature = Math.min(2, Math.max(0, parseFloat(val))); saveToLocal(); showToast(`温度设为 ${temperature}`); } } },
            { icon: 'fas fa-chart-line', label: `Top P: ${topP}`, action: () => { let val = prompt("Top P (0-1)", topP); if(val && !isNaN(val)) { topP = Math.min(1, Math.max(0, parseFloat(val))); saveToLocal(); showToast(`Top P 设为 ${topP}`); } } },
            { icon: 'fas fa-undo-alt', label: '重置默认设置', action: () => { if(confirm('重置所有设置（API Key除外）？')) { temperature = 0.8; topP = 0.9; localStorage.setItem('chapter_mode', 'true'); showToast('已重置'); } } }
        ];
        showActionSheet(items);
    });

    // 其他事件绑定
    sendBtn.addEventListener('click', async () => { const text = messageInput.value.trim(); if(text) { messageInput.value=''; await sendMessageInternal(text); } });
    messageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });
    chatTitleBtn.addEventListener('click', () => { let newTitle = prompt("修改标题", chatTitleBtn.innerText); if(newTitle) { const convo = conversations.find(c => c.id == currentConvoId); convo.title = newTitle; saveToLocal(); chatTitleBtn.innerText = newTitle; renderConvoList(); } });
    menuBtn.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('open'); });
    overlay.addEventListener('click', closeSidebar);
    saveGlobalPromptBtn.addEventListener('click', () => { globalSystemPrompt = globalPromptTextarea.value; saveToLocal(); showToast("全局风格已保存"); });
    newChatBtn.addEventListener('click', () => { createNewConversation(); closeSidebar(); });
    scrollTopBtn.addEventListener('click', scrollToTop);
    scrollPrevUserBtn.addEventListener('click', scrollToPrevUserMsg);
    modelSwitchBtn.addEventListener('click', () => {
        const convo = conversations.find(c => c.id == currentConvoId);
        const newModel = convo.model === 'deepseek-v4-flash' ? 'deepseek-v4-pro' : 'deepseek-v4-flash';
        convo.model = newModel;
        saveToLocal();
        currentModel = newModel;
        updateModelButton();
        showToast(`模型已切换至 ${newModel === 'deepseek-v4-flash' ? 'Flash' : 'Pro'}`);
    });
    storyPromptTextarea.addEventListener('change', () => {
        const convo = conversations.find(c => c.id == currentConvoId);
        convo.storyPrompt = storyPromptTextarea.value;
        saveToLocal();
    });
    searchInput.addEventListener('input', renderConvoList);
    tagFilterInput.addEventListener('input', renderConvoList);
    let draftTimeout;
    messageInput.addEventListener('input', () => {
        clearTimeout(draftTimeout);
        draftTimeout = setTimeout(() => localStorage.setItem('draft_' + currentConvoId, messageInput.value), 500);
    });
    function loadDraft() { const draft = localStorage.getItem('draft_' + currentConvoId); if(draft) messageInput.value = draft; }
    window.addEventListener('resize', () => { if(document.activeElement === messageInput) setTimeout(() => messageInput.scrollIntoView({ block: 'center' }), 100); });

    // 长按输入框全屏编辑
    messageInput.addEventListener('contextmenu', (e) => { e.preventDefault(); fullscreenInput(); });
    let inputLongPress;
    messageInput.addEventListener('touchstart', () => { inputLongPress = setTimeout(() => fullscreenInput(), 500); });
    messageInput.addEventListener('touchend', () => clearTimeout(inputLongPress));
    messageInput.addEventListener('touchmove', () => clearTimeout(inputLongPress));
    function fullscreenInput() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><textarea id="fsText" style="width:100%;height:200px;">${escapeHtml(messageInput.value)}</textarea><button id="fsSave">保存</button><button id="fsCancel">取消</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#fsSave').addEventListener('click', () => { messageInput.value = modal.querySelector('#fsText').value; modal.remove(); });
        modal.querySelector('#fsCancel').addEventListener('click', () => modal.remove());
    }

    loadFromLocal();
    loadDraft();
    setInterval(updateStats, 1000);
</script>
</body>
</html>
